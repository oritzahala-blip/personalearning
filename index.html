<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מבדק דיאגנוסטי רב-שכבתי במתמטיקה</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#dbe3ef;
      --text:#1f2937;
      --muted:#667085;
      --primary:#155eef;
      --secondary:#667085;
      --success:#067647;
      --warning:#b54708;
      --danger:#b42318;
      --soft:#f8fbff;
      --soft2:#fffbea;
    }

    *{box-sizing:border-box}

    html, body{
      margin:0;
      padding:0;
      overflow-x:hidden;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body{direction:rtl}

    .container{
      width:100%;
      max-width:980px;
      margin:0 auto;
      padding:16px;
    }

    h1,h2,h3{margin-top:0; line-height:1.35}
    p, li{line-height:1.7}

    .lead{
      color:var(--muted);
      margin-bottom:22px;
    }

    .card,
    .question,
    .result-box,
    .teacher-box{
      width:100%;
      margin-bottom:18px;
      padding:16px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      overflow:hidden;
    }

    .result-box{
      margin-top:24px;
      background:var(--soft);
      border-color:#dbeafe;
    }

    .teacher-box{
      margin-top:24px;
      background:#fffaf0;
      border-color:#f4d38b;
    }

    .meta-grid,
    .topics-grid,
    .subgrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    @media (max-width:760px){
      .meta-grid,
      .topics-grid,
      .subgrid{
        grid-template-columns:1fr;
      }

      .btn-row{
        flex-direction:column;
      }

      button{
        width:100%;
      }
    }

    label{
      display:block;
      font-weight:bold;
      margin-top:8px;
      margin-bottom:6px;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select{
      width:100%;
      margin-top:8px;
      padding:11px 12px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      background:#fff;
      color:#111827;
      font-size:16px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:24px;
    }

    button{
      border:none;
      border-radius:10px;
      padding:12px 18px;
      cursor:pointer;
      font-size:16px;
      background:var(--primary);
      color:#fff;
    }

    button.secondary{background:var(--secondary)}
    button.ghost{background:#12b76a}
    button.copybtn{background:#194185}

    .hidden{display:none}

    .progress{
      font-size:14px;
      color:var(--muted);
      margin-bottom:12px;
    }

    .example{
      margin-top:10px;
      padding:10px 12px;
      border:1px solid #f0df9b;
      background:var(--soft2);
      border-radius:10px;
      color:#5b4a00;
      font-size:14px;
    }

    .note{
      margin-top:10px;
      font-size:14px;
      color:var(--muted);
    }

    .status-ok{color:var(--success);font-weight:bold}
    .status-bad{color:var(--danger);font-weight:bold}
    .status-warn{color:var(--warning);font-weight:bold}

    .score-big{
      font-size:56px;
      font-weight:700;
      line-height:1;
      margin:0 0 8px 0;
    }

    .score-sub{
      font-size:18px;
      color:var(--muted);
      margin:0;
    }

    .domain-card{
      margin-bottom:16px;
      padding:14px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
    }

    .pill{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      font-size:13px;
      margin-inline-start:8px;
      background:#eef4ff;
      color:#194185;
    }

    .json-area{
      width:100%;
      min-height:260px;
      font-family:monospace;
      direction:ltr;
      text-align:left;
      white-space:pre;
    }

    .math{
      direction:ltr;
      unicode-bidi:bidi-override;
      display:inline-block;
      font-weight:bold;
    }

    .topic-chip{
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      font-weight:normal;
    }

    .inline-help{
      font-size:13px;
      color:var(--muted);
      margin-top:6px;
    }

    .question p{margin:0 0 8px 0}
  </style>
</head>
<body>
  <div class="container">
    <h1>מבדק דיאגנוסטי רב-שכבתי במתמטיקה</h1>
    <p class="lead">המערכת מאפשרת לבנות מבדק מותאם לפי שכבה, סוג מבחן, רמת קושי ונושאים. אם לא נבחרו נושאים, המערכת תטען את נושאי ברירת המחדל המתאימים.</p>

    <div id="setupCard" class="card">
      <h2>הגדרת המבדק</h2>

      <div class="meta-grid">
        <div>
          <label for="studentName">שם התלמיד</label>
          <input type="text" id="studentName" placeholder="הזן שם תלמיד" />
        </div>

        <div>
          <label for="studentClass">כיתה</label>
          <input type="text" id="studentClass" placeholder="לדוגמה: ד׳2" />
        </div>

        <div>
          <label for="teacherName">שם המורה</label>
          <input type="text" id="teacherName" placeholder="הזן שם מורה" />
        </div>

        <div>
          <label for="gradeSelect">שכבת גיל</label>
          <select id="gradeSelect">
            <option value="ג">ג׳</option>
            <option value="ד">ד׳</option>
            <option value="ה">ה׳</option>
            <option value="ו">ו׳</option>
          </select>
        </div>

        <div>
          <label for="examType">סוג מבחן</label>
          <select id="examType">
            <option value="opening">פתיחת שנה</option>
            <option value="midyear">אמצע שנה</option>
            <option value="endyear">סוף שנה</option>
            <option value="focused">מבדק ממוקד</option>
          </select>
        </div>

        <div>
          <label for="difficultyLevel">רמת קושי</label>
          <select id="difficultyLevel">
            <option value="basic">בסיסי</option>
            <option value="regular" selected>רגיל</option>
            <option value="advanced">מתקדם</option>
          </select>
        </div>
      </div>

      <div style="margin-top:18px;">
        <label>נושאים לבחירה</label>
        <div id="topicsContainer" class="topics-grid"></div>
        <div class="inline-help">אם לא תבחר נושאים, המערכת תטען אוטומטית את נושאי ברירת המחדל של השכבה וסוג המבחן.</div>
      </div>

      <div class="btn-row">
        <button type="button" onclick="loadDefaultTopics()">בחר נושאי ברירת מחדל</button>
        <button type="button" class="secondary" onclick="clearTopicSelection()">נקה בחירה</button>
        <button type="button" class="ghost" onclick="buildExam()">בנה מבדק והתחל</button>
      </div>

      <div id="setupMessage"></div>
    </div>

    <form id="quizForm" class="hidden">
      <div class="btn-row">
        <button type="button" class="secondary" onclick="backToSetup()">חזרה להגדרות</button>
      </div>

      <div id="quizMeta" class="card"></div>
      <div id="quizQuestions"></div>

      <div class="btn-row">
        <button type="button" class="ghost" onclick="calculateResults()">סיום וקבלת ציון</button>
      </div>
    </form>

    <div id="studentResult" class="result-box hidden"></div>

    <div id="teacherAccess" class="teacher-box hidden">
      <h3>אבחון מלא</h3>
      <div id="teacherAnalysis" class="hidden"></div>
    </div>
  </div>

  <script>

        midyear: ["מספרים ופעולות", "בעיות מילוליות", "מדידה", "זמן וכסף", "גאומטריה בסיסית"],
        endyear: ["מספרים ופעולות", "בעיות מילוליות", "מדידה", "זמן וכסף", "גאומטריה בסיסית", "אוריינות מתמטית"],

    let activeQuestions = [];
    let currentExamConfig = null;
    let fullAnalysisData = null;

    const gradeSelect = document.getElementById('gradeSelect');
    const examTypeSelect = document.getElementById('examType');

    gradeSelect.addEventListener('change', renderTopics);
    examTypeSelect.addEventListener('change', renderTopics);

    function renderTopics() {
      const grade = gradeSelect.value;
      const allTopics = ALL_TOPICS_BY_GRADE[grade] || [];
      const container = document.getElementById('topicsContainer');

      container.innerHTML = allTopics.map(topic => `
        <label class="topic-chip">
          <input type="checkbox" class="topic-checkbox" value="${escapeHtml(topic)}" />
          ${escapeHtml(topic)}
        </label>
      `).join('');
    }

    function getSelectedTopics() {
      return Array.from(document.querySelectorAll('.topic-checkbox:checked')).map(cb => cb.value);
    }

    function clearTopicSelection() {
      document.querySelectorAll('.topic-checkbox').forEach(cb => cb.checked = false);
    }

    function loadDefaultTopics() {
      clearTopicSelection();
      const grade = gradeSelect.value;
      const examType = examTypeSelect.value;
      const defaults = DEFAULT_TOPICS[grade]?.[examType] || [];

      document.querySelectorAll('.topic-checkbox').forEach(cb => {
        if (defaults.includes(cb.value)) cb.checked = true;
      });
    }

    function shuffle(arr) {
      const clone = [...arr];
      for (let i = clone.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [clone[i], clone[j]] = [clone[j], clone[i]];
      }
      return clone;
    }

    function buildExam() {
      const grade = gradeSelect.value;
      const examType = examTypeSelect.value;
      const difficulty = document.getElementById('difficultyLevel').value;
      let selectedTopics = getSelectedTopics();

      if (!selectedTopics.length) {
        selectedTopics = DEFAULT_TOPICS[grade]?.[examType] || [];
      }

      const setupMessage = document.getElementById('setupMessage');
      if (!selectedTopics.length) {
        setupMessage.innerHTML = '<p class="status-bad">לא נמצאו נושאים מתאימים לבחירה. בחר נושאים או שנה סוג מבחן.</p>';
        return;
      }

      const matched = QUESTION_BANK.filter(q =>
        q.grade === grade &&
        q.examTypes.includes(examType) &&
        q.difficulty === difficulty &&
        selectedTopics.includes(q.topic)
      );

      let questionPool = matched;
      if (questionPool.length < Math.max(8, selectedTopics.length * 2)) {
        questionPool = QUESTION_BANK.filter(q =>
          q.grade === grade &&
          q.examTypes.includes(examType) &&
          selectedTopics.includes(q.topic)
        );
      }

      const selectedQuestions = [];
      selectedTopics.forEach(topic => {
        const pool = shuffle(questionPool.filter(q => q.topic === topic));
        selectedQuestions.push(...pool.slice(0, QUESTIONS_PER_TOPIC));
      });

      activeQuestions = shuffle(
        selectedQuestions.filter((q, index, self) => self.findIndex(x => x.id === q.id) === index)
      );

      if (activeQuestions.length < 4) {
        setupMessage.innerHTML = '<p class="status-bad">בנק השאלות עבור הבחירה הזו עדיין קטן מדי. נסה לבחור רמת קושי אחרת או עוד נושאים.</p>';
        return;
      }

      currentExamConfig = {
        studentName: document.getElementById('studentName').value.trim(),
        studentClass: document.getElementById('studentClass').value.trim(),
        teacherName: document.getElementById('teacherName').value.trim(),
        grade,
        examType,
        difficulty,
        topics: selectedTopics
      };

      setupMessage.innerHTML = '';
      renderExam();
      document.getElementById('setupCard').classList.add('hidden');
      document.getElementById('quizForm').classList.remove('hidden');
      document.getElementById('studentResult').classList.add('hidden');
      document.getElementById('teacherAccess').classList.add('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderExam() {
      const quizMeta = document.getElementById('quizMeta');
      const quizQuestions = document.getElementById('quizQuestions');

      quizMeta.innerHTML = `
        <h2>פרטי המבדק</h2>
        <p><strong>שם התלמיד:</strong> ${escapeHtml(currentExamConfig.studentName || 'לא הוזן')}</p>
        <p><strong>כיתה:</strong> ${escapeHtml(currentExamConfig.studentClass || 'לא הוזנה')}</p>
        <p><strong>שם המורה:</strong> ${escapeHtml(currentExamConfig.teacherName || 'לא הוזן')}</p>
        <p><strong>שכבה:</strong> ${escapeHtml(currentExamConfig.grade)}</p>
        <p><strong>סוג מבחן:</strong> ${escapeHtml(examTypeLabel(currentExamConfig.examType))}</p>
        <p><strong>רמת קושי:</strong> ${escapeHtml(difficultyLabel(currentExamConfig.difficulty))}</p>
        <p><strong>נושאים:</strong> ${escapeHtml(currentExamConfig.topics.join(', '))}</p>
        <p><strong>מספר שאלות:</strong> ${activeQuestions.length}</p>
      `;

      quizQuestions.innerHTML = activeQuestions.map((q, index) => {
        const questionNumber = index + 1;

        if (q.type === 'multiple') {
          return `
            <div class="question">
              <div class="progress">שאלה ${questionNumber} מתוך ${activeQuestions.length} • ${escapeHtml(q.topic)}</div>
              <p><strong>${questionNumber}.</strong> ${q.text}</p>
              ${q.customRender ? `<div class="example">${q.customRender}</div>` : ''}
              <select id="q_${q.id}">
                <option value="">בחר תשובה</option>
                ${q.options.map(opt => `<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`).join('')}
              </select>
            </div>
          `;
        }

        if (q.type === 'openShort') {
          return `
            <div class="question">
              <div class="progress">שאלה ${questionNumber} מתוך ${activeQuestions.length} • ${escapeHtml(q.topic)}</div>
              <p><strong>${questionNumber}.</strong> ${q.text}</p>
              <textarea id="q_${q.id}" placeholder="כתוב תשובה"></textarea>
              <div class="example">נדרש להסביר בקצרה ובבהירות.</div>
            </div>
          `;
        }

        return '';
      }).join('');
    }

    function backToSetup() {
      document.getElementById('quizForm').classList.add('hidden');
      document.getElementById('setupCard').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function examTypeLabel(val) {
      return {
        opening: 'פתיחת שנה',
        midyear: 'אמצע שנה',
        endyear: 'סוף שנה',
        focused: 'מבדק ממוקד'
      }[val] || val;
    }

    function difficultyLabel(val) {
      return {
        basic: 'בסיסי',
        regular: 'רגיל',
        advanced: 'מתקדם'
      }[val] || val;
    }

    function normalizeText(text) {
      return String(text || '').trim().replace(/\s+/g, ' ').toLowerCase();
    }

    function evaluateOpenAnswer(q, answer) {
      const text = normalizeText(answer);
      if (!text) return 0;

      if (q.id === 'd_think_1') {
        const has100 = text.includes('100');
        const hasPlus = text.includes('+') || text.includes('חיבור') || text.includes('בדק') || text.includes('שווה');
        return has100 && hasPlus ? 1 : 0.5;
      }

      if (q.id === 'h_think_1') {
        const has100 = text.includes('100');
        const hasSame = text.includes('שווה') || text.includes('אותה') || text.includes('תוצאה');
        return has100 || hasSame ? 1 : 0.5;
      }

      if (q.id === 'v_think_1') {
        const hasSmall = text.includes('קטן') || text.includes('פי') || text.includes('1000') || text.includes('אלף');
        return hasSmall ? 1 : 0.5;
      }

      return 0.5;
    }

    function getQuestionTopicScoreMap() {
      const map = {};
      activeQuestions.forEach(q => {
        if (!map[q.topic]) {
          map[q.topic] = { score: 0, max: 0, items: [] };
        }
        map[q.topic].max += 1;
      });
      return map;
    }

    function getPerformanceLabel(percent) {
      if (percent >= 85) return 'שליטה מלאה';
      if (percent >= 60) return 'שליטה חלקית';
      return 'נדרש חיזוק משמעותי';
    }

    function getPerformanceMeaning(domainName, percent) {
      if (percent >= 85) return 'התלמיד מפגין שליטה טובה מאוד בתחום ' + domainName + ', מבצע את המשימות בדיוק גבוה ומראה בסיס יציב להמשך למידה.';
      if (percent >= 60) return 'התלמיד מפגין שליטה חלקית בתחום ' + domainName + '. קיימת הבנה בסיסית, אך נדרשים עוד תרגול, ביסוס והעמקה.';
      return 'התלמיד מתקשה בתחום ' + domainName + '. מומלץ תהליך ממוקד של הוראה מותאמת, תרגול מדורג וביסוס מושגים.';
    }

    function getFinalMeaning(percent) {
      if (percent >= 85) return 'התמונה הכוללת מצביעה על שליטה גבוהה מאוד ברוב התחומים שנבדקו.';
      if (percent >= 70) return 'התמונה הכוללת חיובית. יש בסיס טוב, אך נדרשת העמקה במספר תחומים.';
      if (percent >= 50) return 'התמונה הכוללת מצביעה על שליטה חלקית. קיימים פערים משמעותיים המחייבים התערבות ממוקדת.';
      return 'התמונה הכוללת מצביעה על צורך בחיזוק יסודי ובהתאמה אישית של תהליך הלמידה.';
    }

    function inferErrorTypeFromTopic(topic, percent) {
      if (percent >= 85) return 'אין אינדיקציה לפער מהותי בתחום זה.';
      if (topic.includes('מספרים')) return 'קושי חישובי או שליטה חלקית בפעולות.';
      if (topic.includes('שברים')) return 'קושי מושגי בהבנת שברים ובהשוואה או חיבור.';
      if (topic.includes('בעיות')) return 'קושי בתרגום שאלה מילולית לפעולה חשבונית.';
      if (topic.includes('גאומטריה')) return 'קושי במדידה, היקף, שטח או הבנת מבנים.';
      if (topic.includes('אוריינות')) return 'קושי ביישום מתמטיקה במצבים יומיומיים.';
      if (topic.includes('חשיבה')) return 'קושי בהסבר, הנמקה או בדיקת תשובה.';
      if (topic.includes('זמן') || topic.includes('כסף')) return 'קושי ביישום מושגי זמן וכסף.';
      return 'קושי כללי בתחום זה.';
    }

    function buildRecommendation(data) {
      const weak = data.needsSupport || [];
      if (!weak.length) return 'מומלץ להעשיר ולהעמיק: משימות אתגר, שאלות הסבר, חקר דפוסים ופתרון בעיות מרובות שלבים.';
      if (weak.some(x => x.includes('חשיבה'))) return 'מומלץ לשלב תרגול מונחה של הסבר בכתב, שיח מתמטי, דוגמאות נגדיות ושאלות "למה?".';
      if (weak.some(x => x.includes('בעיות')) || weak.some(x => x.includes('אוריינות'))) return 'מומלץ לתרגל המרה של טקסט לפעולה: סימון נתונים, בחירת פעולה, בדיקת סבירות התוצאה.';
      if (weak.some(x => x.includes('שברים'))) return 'מומלץ לחזק הבנה מושגית של שברים באמצעות ייצוגים חזותיים, השוואות וחיבור שברים פשוטים.';
      if (weak.some(x => x.includes('מספרים'))) return 'מומלץ לבסס שוב ערך ספרה, עובדות כפל, חילוק ותהליכי חישוב מדורגים.';
      if (weak.some(x => x.includes('גאומטריה'))) return 'מומלץ לחזק הבחנה בין היקף לשטח, תרגול יחידות מידה ופתרון משימות גאומטריות מדורגות.';
      return 'מומלץ לבנות תכנית תרגול קצרה, עקבית ומדורגת, המתמקדת תחילה בתחומים החלשים ורק אחר כך בהעשרה.';
    }

    function buildResultsPayload() {
      const topicScores = getQuestionTopicScoreMap();
      const answers = {};

      let totalRaw = 0;
      let totalMax = 0;

      activeQuestions.forEach(q => {
        const answer = document.getElementById(`q_${q.id}`)?.value || '';
        answers[q.id] = answer;

        let earned = 0;
        if (q.type === 'multiple') {
          earned = answer === q.correct ? 1 : 0;
        } else if (q.type === 'openShort') {
          earned = evaluateOpenAnswer(q, answer);
        }

        topicScores[q.topic].score += earned;
        topicScores[q.topic].items.push({
          id: q.id,
          subskill: q.subskill,
          earned,
          max: 1,
          explanation: q.explanation
        });

        totalRaw += earned;
        totalMax += 1;
      });

      const topicSummary = {};
      let strengths = [];
      let needsSupport = [];

      Object.keys(topicScores).forEach(topic => {
        const raw = topicScores[topic].score;
        const max = topicScores[topic].max;
        const percent = Math.round((raw / max) * 100);

        topicSummary[topic] = {
          domain_name: topic,
          raw_score: raw,
          max_score: max,
          percent,
          mastery_level: getPerformanceLabel(percent),
          difficulty_type: inferErrorTypeFromTopic(topic, percent),
          teacher_meaning: getPerformanceMeaning(topic, percent),
          items: topicScores[topic].items
        };

        if (percent >= 85) strengths.push(topic);
        if (percent < 60) needsSupport.push(topic);
      });

      const totalPercent = Math.round((totalRaw / totalMax) * 100);

      const structured = {
        student: {
          name: currentExamConfig.studentName,
          className: currentExamConfig.studentClass,
          grade: currentExamConfig.grade
        },
        exam_config: {
          exam_type: currentExamConfig.examType,
          difficulty: currentExamConfig.difficulty,
          topics: currentExamConfig.topics
        },
        score: totalPercent,
        summary: {
          level: getPerformanceLabel(totalPercent),
          meaning: getFinalMeaning(totalPercent)
        },
        domains: topicSummary,
        strengths,
        needs_support: needsSupport,
        next_step_recommendation: buildRecommendation({ needsSupport })
      };

      return {
        student: {
          name: currentExamConfig.studentName,
          className: currentExamConfig.studentClass,
          teacherName: currentExamConfig.teacherName,
          grade: currentExamConfig.grade
        },
        examConfig: currentExamConfig,
        answers,
        topicSummary,
        strengths,
        needsSupport,
        total: {
          raw: totalRaw,
          max: totalMax,
          percent: totalPercent,
          level: getPerformanceLabel(totalPercent),
          meaning: getFinalMeaning(totalPercent)
        },
        structured
      };
    }

    function continueToPlanGenerator() {
      const data = fullAnalysisData;
      if (!data) return;

      localStorage.setItem('diagnosticStructuredData', JSON.stringify(data.structured));
      localStorage.setItem('diagnosticStudentName', data.student?.name || '');
      localStorage.setItem('diagnosticClassName', data.student?.className || '');
      localStorage.setItem('diagnosticTeacherName', data.student?.teacherName || '');

      window.location.href = 'plan-generator.html';
    }

    function openMicrosoftForm() {
      const data = fullAnalysisData;
      if (!data) return;

      const studentName = data.student?.name || '';
      const className = data.student?.className || '';
      const ageLayer = data.student?.grade || className || '';

      const strengths = (data.strengths || []).join(', ') || 'לא זוהו';
      const weaknesses = (data.needsSupport || []).join(', ') || 'לא זוהו';

      const diagnosticSummary =
`שם התלמיד: ${studentName}
כיתה: ${className}
שכבה: ${data.student?.grade || ''}
ציון: ${data.total?.percent || ''}

תחומים לחיזוק:
${weaknesses}

תחומים חזקים:
${strengths}

סיכום:
${data.total?.meaning || ''}`;

      const baseUrl = 'https://forms.office.com/Pages/ResponsePage.aspx?id=DQSIkWdsW0yxEjajBLZtrQAAAAAAAAAAAAN__rwMqcdUNkdaWjNOQzZKV0QzNVNJSTI5MUhOV1BQTC4u';

      const url =
        baseUrl +
        '&r1c74ac76d3d9420b85a753d3933c5f01=' + encodeURIComponent(studentName) +
        '&rb5b4c33c14ff484aaff23ae1e3aaf9f7=' + encodeURIComponent(ageLayer) +
        '&r28495b0ab2ca4f3991bd35e45014d8de=' + encodeURIComponent(diagnosticSummary);

      window.open(url, '_blank');
    }

    function calculateResults() {
      const data = buildResultsPayload();
      fullAnalysisData = data;

      localStorage.setItem('diagnosticStructuredData', JSON.stringify(data.structured));
      localStorage.setItem('diagnosticStudentName', data.student?.name || '');
      localStorage.setItem('diagnosticClassName', data.student?.className || '');
      localStorage.setItem('diagnosticTeacherName', data.student?.teacherName || '');

      const quizForm = document.getElementById('quizForm');
      const studentResult = document.getElementById('studentResult');

      if (quizForm) {
        quizForm.classList.add('hidden');
      }

      if (studentResult) {
        studentResult.innerHTML = `
          <div class="score-big">${data.total.percent}</div>
          <p class="score-sub">הציון הסופי</p>

          <div class="btn-row">
            <button type="button" class="ghost" onclick="continueToPlanGenerator()">פתח תכנית למידה מותאמת</button>
            <button type="button" class="ghost" onclick="openMicrosoftForm()">שלח תקציר אבחון לטופס Microsoft Forms</button>
            <button type="button" class="secondary" onclick="showOpenAnalysis()">הצג אבחון מלא</button>
          </div>

          <p class="note">אפשר לפתוח מיד תכנית למידה אישית, לשלוח תקציר אבחון, או להציג את האבחון המלא.</p>
        `;
        studentResult.classList.remove('hidden');
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function copyStructuredData() {
      const area = document.getElementById('structuredDataArea');
      if (!area) return;

      area.select();
      area.setSelectionRange(0, 999999);

      navigator.clipboard.writeText(area.value).then(() => {
        const msg = document.getElementById('copyMsg');
        if (msg) msg.innerHTML = '<p class="status-ok">נתוני האבחון הועתקו.</p>';
      }).catch(() => {
        const msg = document.getElementById('copyMsg');
        if (msg) msg.innerHTML = '<p class="status-warn">לא ניתן היה להעתיק אוטומטית. אפשר להעתיק ידנית מתוך החלון.</p>';
      });
    }

    function showOpenAnalysis() {
      const teacherAnalysis = document.getElementById('teacherAnalysis');
      const teacherAccess = document.getElementById('teacherAccess');
      const data = fullAnalysisData;

      if (!data) return;

      teacherAccess.classList.remove('hidden');

      teacherAnalysis.innerHTML = `
        <div class="result-box" style="background:#fff;">
          <h3>אבחון מלא</h3>
          <p><strong>שם התלמיד:</strong> ${escapeHtml(data.student.name || 'לא הוזן')}</p>
          <p><strong>כיתה:</strong> ${escapeHtml(data.student.className || 'לא הוזנה')}</p>
          <p><strong>שם המורה:</strong> ${escapeHtml(data.student.teacherName || 'לא הוזן')}</p>
          <p><strong>שכבה:</strong> ${escapeHtml(data.student.grade || '')}</p>
          <p><strong>ציון סופי:</strong> ${data.total.percent} <span class="pill">${escapeHtml(data.total.level)}</span></p>
          <p><strong>משמעות כללית:</strong> ${escapeHtml(data.total.meaning)}</p>

          <h3>חוזקות בולטות</h3>
          <p>${data.strengths.length ? escapeHtml(data.strengths.join(', ')) : 'לא זוהו תחומי חוזקה בולטים.'}</p>

          <h3>תחומים המחייבים חיזוק</h3>
          <p>${data.needsSupport.length ? escapeHtml(data.needsSupport.join(', ')) : 'לא זוהו תחומים המחייבים חיזוק משמעותי.'}</p>

          <h3>פירוט לפי תחומים</h3>
          ${Object.entries(data.topicSummary).map(([topic, d]) => `
            <div class="domain-card">
              <strong>${escapeHtml(topic)}</strong><br>
              <strong>ציון תחומי:</strong> ${d.percent}%<br>
              <strong>רמת שליטה:</strong> ${escapeHtml(d.mastery_level)}<br>
              <strong>אופי הקושי/הביצוע:</strong> ${escapeHtml(d.difficulty_type)}<br>
              <strong>פירוש:</strong> ${escapeHtml(d.teacher_meaning)}
            </div>
          `).join('')}

          <h3>המלצה להמשך</h3>
          <p>${escapeHtml(buildRecommendation(data))}</p>

          <h3>קוד אבחון מלא</h3>
          <textarea id="structuredDataArea" class="json-area" readonly>${JSON.stringify(data.structured, null, 2)}</textarea>

          <div class="btn-row">
            <button type="button" class="copybtn" onclick="copyStructuredData()">העתק קוד אבחון</button>
            <button type="button" class="ghost" onclick="continueToPlanGenerator()">פתח תכנית למידה מותאמת</button>
          </div>
          <div id="copyMsg"></div>
        </div>
      `;

      teacherAnalysis.classList.remove('hidden');
      teacherAccess.scrollIntoView({ behavior: 'smooth' });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    renderTopics();
    loadDefaultTopics();
  </script>
