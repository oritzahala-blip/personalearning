<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מבדק דיאגנוסטי</title>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0}
.container{max-width:900px;margin:auto;padding:16px}
.question{background:#fff;padding:12px;margin:10px 0;border-radius:10px}
button{padding:10px 14px;border:none;border-radius:8px;background:#155eef;color:#fff}
.math{direction:ltr;unicode-bidi:bidi-override}
</style>
</head>

<body>
<div class="container">

<h2>הגדרת מבדק</h2>

שם תלמיד:<input id="student"><br><br>
כיתה:<input id="class"><br><br>
שם מורה:<input id="teacher"><br><br>

שכבה:
<select id="grade">
<option value="ג">ג</option>
<option value="ד">ד</option>
<option value="ה">ה</option>
<option value="ו">ו</option>
</select><br><br>

רמת קושי:
<select id="level">
<option value="easy">בסיסית</option>
<option value="medium">רגילה</option>
<option value="hard">מתקדמת</option>
</select><br><br>

נושאים:<br>
<label><input type="checkbox" value="חשבון"> חשבון</label>
<label><input type="checkbox" value="שברים"> שברים</label>
<label><input type="checkbox" value="בעיות"> בעיות מילוליות</label>
<br><br>

<button onclick="startExam()">התחל מבחן</button>

<div id="exam"></div>

</div>

<script>

const BANK = [

{g:"ג",t:"חשבון",q:'<span class="math">6+7</span>',a:["13","12","14"],c:0},
{g:"ג",t:"חשבון",q:'<span class="math">9+8</span>',a:["17","18","16"],c:0},

{g:"ד",t:"חשבון",q:'<span class="math">48×6</span>',a:["288","268","298"],c:0},
{g:"ד",t:"חשבון",q:'<span class="math">56÷8</span>',a:["7","8","6"],c:0},

{g:"ה",t:"שברים",q:'1/2 + 1/4',a:["3/4","2/4","1"],c:0},
{g:"ה",t:"שברים",q:'מה גדול יותר?',a:["3/4","2/3"],c:0},

{g:"ו",t:"בעיות",q:'אם מוצר עולה 100 ויש 20% הנחה?',a:["80","70","90"],c:0},

];

let questions=[];

function startExam(){

const grade = document.getElementById("grade").value;
const topics = [...document.querySelectorAll("input[type=checkbox]:checked")].map(x=>x.value);

let pool = BANK.filter(q=>q.g===grade);

if(topics.length>0){
pool = pool.filter(q=>topics.includes(q.t));
}

if(pool.length===0){
alert("אין שאלות - בדוק שכבה/נושאים");
return;
}

questions = shuffle(pool).slice(0,10);

render();

}

function render(){

const exam = document.getElementById("exam");
exam.innerHTML="";

questions.forEach((q,i)=>{
let html=`<div class="question">
<p>${i+1}. ${q.q}</p>`;

q.a.forEach((opt,j)=>{
html+=`<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`;
});

html+="</div>";
exam.innerHTML+=html;
});

exam.innerHTML+=`<button onclick="finish()">סיום</button>`;

}

function finish(){

let score=0;

questions.forEach((q,i)=>{
const ans=document.querySelector(`input[name=q${i}]:checked`);
if(ans && Number(ans.value)===q.c) score++;
});

const result={
student:document.getElementById("student").value,
class:document.getElementById("class").value,
teacher:document.getElementById("teacher").value,
score:Math.round(score/questions.length*100)
};

localStorage.setItem("diag",JSON.stringify(result));

window.location.href="plan-generator.html";

}

function shuffle(a){
return a.sort(()=>Math.random()-0.5);
}

</script>

</body>
</html>
