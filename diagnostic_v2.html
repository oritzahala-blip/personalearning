<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מבדק דיאגנוסטי רב-שכבתי במתמטיקה – גרסה 2</title>
  <style>
    :root{
      --bg:#f5f7fb;--card:#ffffff;--line:#dbe3ef;--text:#1f2937;--muted:#667085;
      --primary:#155eef;--secondary:#667085;--success:#067647;--warning:#b54708;--danger:#b42318;
      --soft:#f8fbff;--soft2:#fffbea;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .container{max-width:1180px;margin:24px auto;background:var(--card);border-radius:18px;padding:28px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    h1,h2,h3{margin-top:0;line-height:1.35}
    p,li{line-height:1.7}
    .lead{color:var(--muted);margin-bottom:22px}
    .section{display:none}.section.active{display:block}
    .question,.card{margin-bottom:18px;padding:16px;border:1px solid var(--line);border-radius:14px;background:#fafbfd}
    .question p{margin:0 0 8px 0}
    .grid-2,.grid-3{display:grid;gap:16px}.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr 1fr}
    @media (max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}.btn-row{flex-direction:column}button{width:100%}}
    label{display:block;font-weight:bold;margin-top:8px}
    input[type="text"],input[type="number"],textarea,select{width:100%;margin-top:8px;padding:11px 12px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;color:#111827;font-size:16px}
    textarea{min-height:100px;resize:vertical}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}
    button{border:none;border-radius:10px;padding:12px 18px;cursor:pointer;font-size:16px;background:var(--primary);color:white}
    button.secondary{background:var(--secondary)} button.ghost{background:#12b76a} button.copybtn{background:#194185}
    .progress{font-size:14px;color:var(--muted);margin-bottom:16px}
    .example{margin-top:10px;padding:10px 12px;border:1px solid #f0df9b;background:var(--soft2);border-radius:10px;color:#5b4a00;font-size:14px}
    .note{margin-top:10px;font-size:14px;color:var(--muted)} .hidden{display:none}
    .result-box{margin-top:24px;padding:22px;border:1px solid #dbeafe;background:var(--soft);border-radius:14px;line-height:1.8}
    .score-big{font-size:56px;font-weight:700;line-height:1;margin:0 0 8px 0}.score-sub{font-size:18px;color:var(--muted);margin:0}
    .status-ok{color:var(--success);font-weight:bold}.status-bad{color:var(--danger);font-weight:bold}.status-warn{color:var(--warning);font-weight:bold}
    .domain-card{margin-bottom:16px;padding:14px;background:#fff;border:1px solid var(--line);border-radius:12px}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:13px;margin-inline-start:8px;background:#eef4ff;color:#194185}
    .json-area{width:100%;min-height:260px;font-family:monospace;direction:ltr;text-align:left;white-space:pre}
    .topic-box{padding:12px;border:1px solid #dbe3ef;border-radius:12px;background:#fff;margin-top:8px}
    .topic-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;margin-top:8px}
    .topic-list label{font-weight:normal;margin-top:0;padding:8px 10px;background:#fff;border:1px solid #e5e7eb;border-radius:10px}
    .meta-summary{padding:12px;border:1px dashed #bfd1f6;background:#f8fbff;border-radius:12px;margin-top:12px}
  </style>
</head>
<body>
  <div class="container">
    <h1>מבדק דיאגנוסטי רב-שכבתי במתמטיקה – גרסה 2</h1>
    <p class="lead">המערכת מותאמת לשכבות ג׳–ו׳, מאפשרת בחירה של סוג מבחן, רמת קושי ונושאים, ויודעת לשלוף שאלות מתחלפות מתוך בנק שאלות.</p>

    <form id="quizForm">
      <div class="section active" id="setupSection">
        <h2>הגדרת המבדק</h2>
        <div class="grid-3">
          <div class="card">
            <label for="studentName">שם התלמיד</label>
            <input type="text" id="studentName" placeholder="הזן שם תלמיד" />
          </div>
          <div class="card">
            <label for="studentClass">כיתה</label>
            <input type="text" id="studentClass" placeholder="לדוגמה: ה׳2" />
          </div>
          <div class="card">
            <label for="teacherName">שם המורה</label>
            <input type="text" id="teacherName" placeholder="הזן שם מורה" />
          </div>
        </div>

        <div class="grid-3">
          <div class="card">
            <label for="gradeLevel">שכבה</label>
            <select id="gradeLevel">
              <option value="3">ג׳</option>
              <option value="4">ד׳</option>
              <option value="5" selected>ה׳</option>
              <option value="6">ו׳</option>
            </select>
          </div>
          <div class="card">
            <label for="examType">סוג מבחן</label>
            <select id="examType">
              <option value="opening">פתיחת שנה</option>
              <option value="midyear">אמצע שנה</option>
              <option value="endyear">סוף שנה</option>
              <option value="focused">מבדק ממוקד</option>
            </select>
          </div>
          <div class="card">
            <label for="difficultyLevel">רמת קושי</label>
            <select id="difficultyLevel">
              <option value="basic">בסיסי</option>
              <option value="regular" selected>רגיל</option>
              <option value="advanced">מתקדם</option>
            </select>
          </div>
        </div>

        <div class="card">
          <label>נושאים למבדק</label>
          <div class="note">אם לא תבחר נושאים, המערכת תטען אוטומטית את נושאי החובה הרלוונטיים לשכבה, לסוג המבחן ולרמת הקושי.</div>
          <div id="topicsContainer" class="topic-list"></div>
          <div class="btn-row">
            <button type="button" class="secondary" onclick="applyDefaultTopics()">השתמש בנושאי ברירת המחדל</button>
            <button type="button" class="secondary" onclick="clearTopics()">נקה בחירה ידנית</button>
          </div>
          <div id="topicsSummary" class="meta-summary"></div>
        </div>

        <div class="btn-row">
          <button type="button" onclick="buildAssessment()">בנה מבדק והתחל</button>
        </div>
        <div id="setupMessage"></div>
      </div>

      <div class="section" id="assessmentSection">
        <div class="progress" id="assessmentProgress"></div>
        <h2 id="assessmentTitle">המבדק שלך מוכן</h2>
        <div id="questionsMount"></div>
        <div class="btn-row">
          <button type="button" class="secondary" onclick="goBackToSetup()">חזרה להגדרות</button>
          <button type="button" class="ghost" onclick="calculateResults()">סיום וקבלת ציון</button>
        </div>
      </div>
    </form>

    <div id="studentResult" class="result-box hidden"></div>

    <div id="teacherAccess" class="teacher-box hidden">
      <h3>אבחון מלא</h3>
      <div id="teacherAnalysis" class="hidden"></div>
    </div>
  </div>

    function escapeHtml(str) {

      return selected.length ? selected : getAvailableTopics();

    function pickQuestions(bank, topics, grade, examType, difficulty) {
      const difficultyOrder = { basic:0, regular:1, advanced:2 };
      const selected = [];
      topics.forEach(topic => {
        let candidates = bank.filter(q => q.grade === grade && q.topic === topic && q.examTypes.includes(examType) && q.difficulty === difficulty);
        if (!candidates.length) {
          candidates = bank.filter(q => q.grade === grade && q.topic === topic && q.examTypes.includes(examType));
        }
        candidates = shuffle(candidates);
        const takeCount = topic === 'mathematical_reasoning' ? 1 : Math.min(2, candidates.length);
        selected.push(...candidates.slice(0, takeCount));
      });
      return shuffle(selected);
    }

    function shuffle(arr){
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildAssessment() {

      const studentClass = document.getElementById('studentClass').value.trim();

      generatedAssessment = pickQuestions(QUESTION_BANK, topics, grade, examType, difficulty);

    function renderQuestion(q, idx) {
      if (q.type === 'mcq') {
        return `
          <div class="question">
            <p><strong>${idx + 1}.</strong> ${escapeHtml(q.prompt)}</p>
            <select id="ans_${q.id}">

              ${q.options.map(opt => `<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`).join('')}
            </select>
          </div>
        `;
      }
      return `
        <div class="question">
          <p><strong>${idx + 1}.</strong> ${escapeHtml(q.prompt)}</p>
          <textarea id="ans_${q.id}" placeholder="${escapeHtml(q.placeholder || 'כתוב תשובה כאן')}"></textarea>
          <div class="example">זוהי שאלה פתוחה. המערכת תנתח את התשובה לפי רובריקה.</div>
        </div>
      `;
    }

    function toHebrewGrade(grade){ return ({3:'ג׳',4:'ד׳',5:'ה׳',6:'ו׳'})[grade] || grade; }
    function examTypeLabel(type){ return ({opening:'פתיחת שנה',midyear:'אמצע שנה',endyear:'סוף שנה',focused:'מבדק ממוקד'})[type] || type; }
    function difficultyLabel(type){ return ({basic:'בסיסית',regular:'רגילה',advanced:'מתקדמת'})[type] || type; }

    function gradeOpenQuestion(q, answer) {
      const text = normalizeText(answer);
      if (!text) return 0;
      if (q.grader === 'sum100') {
        const nums = answer.match(/\d+/g) || [];
        let score = 0;
        if (nums.length >= 2) {
          const a = Number(nums[0]), b = Number(nums[1]);
          if (!Number.isNaN(a) && !Number.isNaN(b) && a !== b && a + b === 100) score += 1;
        }
        if (text.includes('100') || text.includes('+') || text.includes('חיבור') || text.includes('בדק') || text.includes('שווה')) score += 1;
        return Math.min(score, q.maxScore || 2);
      }
      if (q.grader === 'equalProducts') {
        const mentions100 = text.includes('100');
        const mentionsSame = text.includes('אותה') || text.includes('שווה') || text.includes('מכפלה') || text.includes('תוצאה');
        const mentionsRelation = text.includes('חצי') || text.includes('פי 2') || text.includes('כפול');
        if ((mentions100 && mentionsSame) || (mentionsSame && mentionsRelation)) return 2;
        if (mentions100 || mentionsSame || mentionsRelation) return 1;
        return 0;
      }
      if (q.grader === 'timesPointOne') {
        const hasSmaller = text.includes('קטן') || text.includes('קטנה') || text.includes('עשירית') || text.includes('0.1') || text.includes('מזיז') || text.includes('נקודה');
        const hasExample = /\d/.test(text);
        if (hasSmaller && hasExample) return 2;
        if (hasSmaller || hasExample) return 1;
        return 0;
      }
      return 0;
    }

    function calculateResults() {
      if (!generatedAssessment.length) return;
      const domainScores = {};
      const topicScores = {};
      let totalRaw = 0;
      let totalMax = 0;
      const detailedAnswers = {};

      generatedAssessment.forEach(q => {
        const field = document.getElementById(`ans_${q.id}`);
        const answer = field ? field.value : '';
        let score = 0;
        let maxScore = q.type === 'open' ? (q.maxScore || 2) : 1;

        if (q.type === 'mcq') score = answer === q.correct ? 1 : 0;
        else score = gradeOpenQuestion(q, answer);

        const domain = TOPIC_DOMAIN_MAP[q.topic] || 'כללי';
        if (!domainScores[domain]) domainScores[domain] = { score:0, max:0, topicRefs:new Set(), difficulty_type:'' };
        if (!topicScores[q.topic]) topicScores[q.topic] = { score:0, max:0, label:TOPIC_LABELS[q.topic], domain };

        domainScores[domain].score += score;
        domainScores[domain].max += maxScore;
        domainScores[domain].topicRefs.add(q.topic);
        topicScores[q.topic].score += score;
        topicScores[q.topic].max += maxScore;

        totalRaw += score;
        totalMax += maxScore;

        detailedAnswers[q.id] = { prompt:q.prompt, topic:q.topic, answer, score, maxScore, skill:q.skill };
      });

      Object.keys(domainScores).forEach(domain => {
        domainScores[domain].percent = Math.round((domainScores[domain].score / domainScores[domain].max) * 100);
        domainScores[domain].level = getPerformanceLabel(domainScores[domain].percent);
        domainScores[domain].meaning = getPerformanceMeaning(domain, domainScores[domain].percent);
        domainScores[domain].difficulty_type = inferErrorTypeByDomain(domain, domainScores[domain].percent);
      });

      Object.keys(topicScores).forEach(topic => {
        topicScores[topic].percent = Math.round((topicScores[topic].score / topicScores[topic].max) * 100);
      });

      const totalPercent = Math.round((totalRaw / totalMax) * 100);
      const strengths = Object.values(topicScores).filter(t => t.percent >= 85).map(t => t.label);
      const needsSupport = Object.values(topicScores).filter(t => t.percent < 60).map(t => t.label);

      const structured = {
        student: {
          name: document.getElementById('studentName').value.trim(),
          className: document.getElementById('studentClass').value.trim(),
          gradeLevel: assessmentMeta.grade,
          teacherName: document.getElementById('teacherName').value.trim()
        },
        assessment_meta: {
          exam_type: assessmentMeta.examType,
          exam_type_label: examTypeLabel(assessmentMeta.examType),
          difficulty: assessmentMeta.difficulty,
          difficulty_label: difficultyLabel(assessmentMeta.difficulty),
          topics: assessmentMeta.topics,
          topics_labels: assessmentMeta.topics.map(t => TOPIC_LABELS[t])
        },
        score: totalPercent,
        summary: {
          level: getPerformanceLabel(totalPercent),
          meaning: getFinalMeaning(totalPercent)
        },
        domains: Object.fromEntries(Object.entries(domainScores).map(([domain, d]) => [domain, {
          domain_name: domain,
          raw_score: d.score,
          max_score: d.max,
          percent: d.percent,
          mastery_level: d.level,
          difficulty_type: d.difficulty_type,
          teacher_meaning: d.meaning,
          topics_included: [...d.topicRefs].map(t => TOPIC_LABELS[t])
        }])),
        subskills: Object.fromEntries(Object.entries(topicScores).map(([topic, t]) => [topic, {
          topic_name: t.label,
          domain_name: t.domain,
          raw_score: t.score,
          max_score: t.max,
          percent: t.percent
        }])),
        strengths,
        needs_support: needsSupport,
        pedagogical_flags: buildPedagogicalFlags(domainScores, topicScores),
        next_step_recommendation: buildRecommendation({ needsSupport })
      };

      const data = {
        student: structured.student,
        answers: detailedAnswers,
        domainScores,
        topicScores,
        strengths,
        needsSupport,
        total: {
          raw: totalRaw,
          max: totalMax,
          percent: totalPercent,
          level: getPerformanceLabel(totalPercent),
          meaning: getFinalMeaning(totalPercent)
        },
        structured
      };

      window.fullAnalysisData = data;
      localStorage.setItem('diagnosticStructuredData', JSON.stringify(structured));
      localStorage.setItem('diagnosticStudentName', structured.student.name || '');
      localStorage.setItem('diagnosticClassName', structured.student.className || '');
      localStorage.setItem('diagnosticTeacherName', structured.student.teacherName || '');

      document.getElementById('quizForm').classList.add('hidden');
      const studentResult = document.getElementById('studentResult');
      studentResult.innerHTML = `
        <div class="score-big">${data.total.percent}</div>
        <p class="score-sub">הציון הסופי</p>
        <div class="btn-row">
          <button type="button" class="ghost" onclick="continueToPlanGenerator()">פתח תכנית למידה מותאמת</button>
          <button type="button" class="ghost" onclick="openMicrosoftForm()">שלח תקציר אבחון לטופס Microsoft Forms</button>
          <button type="button" class="secondary" onclick="showOpenAnalysis()">הצג אבחון מלא</button>

      `;
      studentResult.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function inferErrorTypeByDomain(domain, percent) {
      if (percent >= 85) return 'אין אינדיקציה לפער מהותי בתחום זה.';
      if (domain === 'מספרים ופעולות') return 'קושי בחישוב, בערך ספרה או בשליטה בפעולות בסיסיות.';
      if (domain.includes('שברים') || domain.includes('אחוזים')) return 'קושי מושגי בשברים, אחוזים או קשרים בין ייצוגים.';
      if (domain === 'בעיות מילוליות') return 'קושי בתרגום טקסט לפעולה ובפתרון רב־שלבי.';
      if (domain === 'גאומטריה ומדידה') return 'קושי במדידה, היקף, שטח, נפח או הבחנה בין מושגים.';
      if (domain === 'אוריינות מתמטית') return 'קושי ביישום המתמטיקה בהקשרים יומיומיים.';
      if (domain === 'חשיבה מתמטית והבנה') return 'קושי בהסבר, נימוק ובקרה על תהליך החשיבה.';
      return 'קושי כללי בתחום זה.';
    }

    function buildPedagogicalFlags(domainScores, topicScores) {
      const getPercent = (topic) => topicScores[topic]?.percent ?? null;
      return {
        computational_knowledge: inferKnowledge(getPercent('numbers') || 0, getPercent('fractions') || getPercent('fractions_intro') || getPercent('fractions_decimals') || 0),
        application_and_problem_solving: inferApplication(getPercent('word_problems') || 0, getPercent('math_literacy') || 0),
        mathematical_reasoning: inferThinking(getPercent('mathematical_reasoning') || 0),
        geometry_and_measurement: inferGeometry(Math.round(((getPercent('geometry') || 0) + (getPercent('measurement') || 0))/((getPercent('geometry') !== null && getPercent('measurement') !== null)?2:1 || 1)))
      };
    }

          <p><strong>שם המורה:</strong> ${escapeHtml(data.student.teacherName || 'לא הוזן')}</p>
          <p><strong>סוג מבחן:</strong> ${escapeHtml(examTypeLabel(data.structured.assessment_meta.exam_type))}</p>
          <p><strong>רמת קושי:</strong> ${escapeHtml(difficultyLabel(data.structured.assessment_meta.difficulty))}</p>
          <p><strong>ציון סופי:</strong> ${data.total.percent} <span class="pill">${escapeHtml(data.total.level)}</span></p>
          <p><strong>משמעות כללית:</strong> ${escapeHtml(data.total.meaning)}</p>

          <h3>חוזקות בולטות</h3>
          <p>${data.strengths.length ? escapeHtml(data.strengths.join(', ')) : 'לא זוהו תחומי חוזקה בולטים ברמת שליטה מלאה.'}</p>

          <h3>תחומים המחייבים חיזוק</h3>
          <p>${data.needsSupport.length ? escapeHtml(data.needsSupport.join(', ')) : 'לא זוהו תחומים המחייבים חיזוק משמעותי.'}</p>

          <h3>פירוט לפי תחומים</h3>
          ${Object.entries(data.domainScores).map(([domain, d]) => `
            <div class="domain-card">
              <strong>${escapeHtml(domain)}</strong><br>
              <strong>ציון תחומי:</strong> ${d.percent}%<br>
              <strong>רמת שליטה:</strong> ${escapeHtml(d.level)}<br>
              <strong>אופי הקושי/הביצוע:</strong> ${escapeHtml(d.difficulty_type)}<br>
              <strong>פירוש:</strong> ${escapeHtml(d.meaning)}
            </div>
          `).join('')}

          <h3>פירוט לפי תת-מיומנויות</h3>
          ${Object.entries(data.topicScores).map(([topic, t]) => `
            <div class="domain-card">
              <strong>${escapeHtml(t.label)}</strong><br>
              <strong>תחום:</strong> ${escapeHtml(t.domain)}<br>
              <strong>ציון:</strong> ${t.percent}%
            </div>
          `).join('')}

          <h3>המלצה להמשך</h3>
          <p>${escapeHtml(buildRecommendation(data))}</p>

          <h3>קוד אבחון מלא</h3>
          <textarea id="structuredDataArea" class="json-area" readonly>${JSON.stringify(data.structured, null, 2)}</textarea>

          <div class="btn-row">
            <button type="button" class="copybtn" onclick="copyStructuredData()">העתק קוד אבחון</button>
            <button type="button" class="ghost" onclick="continueToPlanGenerator()">פתח תכנית למידה מותאמת</button>
          </div>
          <div id="copyMsg"></div>
        </div>
      `;
      teacherAnalysis.classList.remove('hidden');
      teacherAccess.scrollIntoView({ behavior: 'smooth' });
    }

    renderTopicSelector();
  </script>
</body>
</html>
