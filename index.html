<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מבדק דיאגנוסטי</title>

<style>
body {margin:0;font-family:Arial;background:#f5f7fb;overflow-x:hidden;}
.container{max-width:100%;padding:16px;margin:auto;}
.question{margin-bottom:16px;padding:12px;border:1px solid #ddd;border-radius:10px;background:#fff;}
button{padding:10px 14px;border:none;border-radius:8px;background:#155eef;color:#fff;cursor:pointer;}
.math{direction:ltr;unicode-bidi:bidi-override;display:inline-block;font-weight:bold;}
</style>
</head>

<body>
<div class="container">

<h2>הגדרת מבדק</h2>

שם: <input id="name"><br><br>
כיתה: <input id="class"><br><br>

שכבה:
<select id="grade">
<option value="ג">ג</option>
<option value="ד">ד</option>
<option value="ה">ה</option>
<option value="ו">ו</option>
</select><br><br>

<button onclick="startExam()">התחל מבדק</button>

<div id="exam"></div>

</div>

<script>

const QUESTIONS_PER_TOPIC = 4;

const questionBank = [

{grade:"ד",topic:"כפל",q:'<span class="math">6 × 7</span>',a:["42","36","48","40"],c:0},
{grade:"ד",topic:"חילוק",q:'<span class="math">56 ÷ 8</span>',a:["7","6","8","9"],c:0},
{grade:"ד",topic:"חיבור",q:'<span class="math">345 + 127</span>',a:["472","462","482","452"],c:0},
{grade:"ד",topic:"חיסור",q:'<span class="math">900 - 275</span>',a:["625","635","615","605"],c:0},

{grade:"ה",topic:"כפל",q:'<span class="math">48 × 6</span>',a:["288","268","298","278"],c:0},
{grade:"ה",topic:"חילוק",q:'<span class="math">156 ÷ 12</span>',a:["13","12","14","11"],c:0},

];

let selectedQuestions = [];

function startExam(){
  const grade = document.getElementById("grade").value;

  const filtered = questionBank.filter(q=>q.grade===grade);

  selectedQuestions = shuffle(filtered).slice(0, QUESTIONS_PER_TOPIC*3);

  renderExam();
}

function renderExam(){
  const examDiv = document.getElementById("exam");
  examDiv.innerHTML="";

  selectedQuestions.forEach((q,i)=>{
    let html = `<div class="question">
    <p>${i+1}. ${q.q}</p>`;

    q.a.forEach((opt,j)=>{
      html+=`<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`;
    });

    html+="</div>";
    examDiv.innerHTML+=html;
  });

  examDiv.innerHTML+=`<button onclick="finishExam()">סיום וקבלת ציון</button>`;
}

function finishExam(){
  let score=0;

  selectedQuestions.forEach((q,i)=>{
    const ans = document.querySelector(`input[name=q${i}]:checked`);
    if(ans && Number(ans.value)===q.c) score++;
  });

  const percent = Math.round(score/selectedQuestions.length*100);

  const result = {
    name:document.getElementById("name").value,
    class:document.getElementById("class").value,
    score:percent
  };

  localStorage.setItem("diagnosticData",JSON.stringify(result));

  window.location.href="plan-generator.html";
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

</script>

</body>
</html>
