<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מחולל תכנית לימודים מותאמת – גרסה 2</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--line:#d8e0eb;--text:#1f2937;--muted:#667085;--primary:#155eef;--secondary:#667085;--success:#067647;--soft:#f8fbff;--warm:#fff8ef}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .container{max-width:1120px;margin:24px auto;padding:28px;background:var(--card);border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    h1,h2,h3,h4{margin-top:0;line-height:1.35} p,li{line-height:1.7}.lead,.note{color:var(--muted)}
    .card,.soft,.warm{border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:18px;background:#fff}.soft{background:var(--soft)}.warm{background:var(--warm)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:860px){.grid{grid-template-columns:1fr}.btn-row{flex-direction:column}button{width:100%}}
    label{display:block;font-weight:bold;margin:8px 0 6px} input[type=text],input[type=date],textarea,select{width:100%;padding:11px 12px;border:1px solid #cbd5e1;border-radius:10px;font-size:16px}
    textarea{min-height:120px;resize:vertical}.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px} button{border:none;border-radius:10px;padding:12px 18px;font-size:16px;cursor:pointer;background:var(--primary);color:#fff} button.secondary{background:var(--secondary)}
    details{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px 14px;margin-bottom:14px} summary{cursor:pointer;font-weight:bold}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:13px;background:#eef4ff;color:#194185;margin-inline-start:6px}
    .exercise{background:#fafbfd;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-top:10px}.feedback{margin-top:8px;padding:10px 12px;border-radius:10px;background:#f8fbff;border:1px solid #dbeafe}.hidden{display:none}
    .json{width:100%;min-height:240px;font-family:monospace;direction:ltr;text-align:left;white-space:pre}
  </style>
</head>
<body>
  <div class="container">
    <h1>מחולל תכנית לימודים מותאמת – גרסה 2</h1>
    <p class="lead">המחולל מותאם לשכבות ג׳–ו׳, קורא את נתוני האבחון מהמבדק או מהדבקה ידנית, ובונה תכנית מדורגת לפי שכבה, סוג מבחן, קושי, תחומים חלשים ומשך התכנית.</p>

    <div class="grid">
      <div class="card">
        <label for="teacherName">שם המורה</label>
        <input type="text" id="teacherName" placeholder="שם המורה" />
        <label for="studentName2">שם התלמיד <span style="color:#b42318">*</span></label>
        <input type="text" id="studentName2" placeholder="שם התלמיד" />
        <label for="homeClass">כיתה</label>
        <input type="text" id="homeClass" placeholder="לדוגמה: ה׳2" />
        <label for="planDate">תאריך יצירת התכנית</label>
        <input type="date" id="planDate" />
      </div>
      <div class="card">
        <label for="timeframe">משך התכנית</label>
        <select id="timeframe">
          <option value="short">תכנית קצרה: יום עד שלושה ימים</option>
          <option value="week">תכנית רחבה: עד שבוע</option>
        </select>
        <label for="studentNotes">מידע נוסף (אופציונלי)</label>
        <textarea id="studentNotes" placeholder="למשל: קושי בריכוז, קצב איטי, צורך בתיווך שפתי, העדפה לתרגול חזותי."></textarea>
      </div>
    </div>

    <div class="card">
      <label for="diagnosticInput">קוד אבחון / נתוני אבחון</label>
      <textarea id="diagnosticInput" class="json" placeholder='הדבק כאן JSON של האבחון או הגע ישירות מהמבדק'></textarea>
      <div class="btn-row">
        <button type="button" onclick="generateProgram()">צור תכנית מותאמת</button>
      </div>
      <div id="detailsMsg"></div>
    </div>

    <div id="programArea" class="hidden">
      <div class="warm"><h3>תמצית מצב לימודי</h3><div id="summaryBox"></div></div>
      <div class="soft"><h3>אינדקס תכנית</h3><ol id="resourceIndex"></ol></div>
      <div id="programContent"></div>
      <div class="soft">
        <h3>בלוק נתונים של התכנית</h3>
        <textarea id="programJson" class="json" readonly></textarea>
      </div>
    </div>
  </div>
<script>
const TOPIC_TEMPLATES = {
  'מספרים ופעולות': {
    explanation:'ביסוס ערך ספרה, ארבע פעולות החשבון, אסטרטגיות חישוב ובקרה על תשובה.',
    exercises:[
      {prompt:'חשב: 4,208 + 1,376',hint:'חבר לפי אחדות, עשרות, מאות ואלפים.',answer:'5,584',feedback:'אם טעית, בדוק האם בוצעה המרה נכונה.'},
      {prompt:'חשב: 8,540 - 2,175',hint:'אפשר לפרק לשלבים או לפתור במאונך.',answer:'6,365',feedback:'בדוק השאלה בעשרות ובמאות.'}
    ]
  },
  'שברים': {
    explanation:'חיזוק הבנה מושגית של שברים, השוואה, חיבור והמרה לייצוגים מקבילים.',
    exercises:[
      {prompt:'מה גדול יותר: 3/4 או 5/8?',hint:'אפשר להשוות למכנה 8.',answer:'3/4',feedback:'3/4 הם 6/8 ולכן גדולים מ-5/8.'},
      {prompt:'חשב: 1/2 + 1/4',hint:'כתוב 1/2 כ-2/4.',answer:'3/4',feedback:'2/4 ועוד 1/4 הם 3/4.'}
    ]
  },
  'שברים ושברים עשרוניים': {
    explanation:'חיזוק מעבר בין שברים לשברים עשרוניים, השוואה ויישום.',
    exercises:[
      {prompt:'המר את 3/5 לשבר עשרוני.',hint:'חלק 3 ב-5.',answer:'0.6',feedback:'3/5 שווה 0.6.'},
      {prompt:'מה גדול יותר: 0.7 או 2/3?',hint:'אפשר להמיר את 2/3 בקירוב.',answer:'0.7',feedback:'0.7 גדול מעט מ-0.666...'}
    ]
  },
  'אחוזים ושברים': {
    explanation:'קישור בין אחוזים, שברים ויישומים במצבי קנייה, הנחה והשוואה.',
    exercises:[
      {prompt:'20% מתוך 80 הם?',hint:'10% מתוך 80 הם 8.',answer:'16',feedback:'20% הם פעמיים 10% ולכן 16.'},
      {prompt:'מחיר מוצר 200 ₪ והנחה 15%. מה גובה ההנחה?',hint:'10% הם 20, ו-5% הם 10.',answer:'30',feedback:'15% מתוך 200 הם 30.'}
    ]
  },
  'יחס ופרופורציה': {
    explanation:'הבנת יחס, פרופורציה פשוטה והעברת יחסים למצבים מילוליים.',
    exercises:[
      {prompt:'ביחס 2:3, אם הכמות הקטנה היא 8, מהי הגדולה?',hint:'מצא פי כמה 2 הפך ל-8.',answer:'12',feedback:'היחס הוכפל פי 4 ולכן 3 הפך ל-12.'},
      {prompt:'אם 3 מחברות עולות 18 ₪, כמה יעלו 5?',hint:'מצא מחיר ליחידה.',answer:'30',feedback:'18 חלקי 3 הם 6, ו-5 כפול 6 הם 30.'}
    ]
  },
  'בעיות מילוליות': {
    explanation:'תרגול תרגום של טקסט לפעולה, פתרון בשלבים ובדיקת סבירות התוצאה.',
    exercises:[
      {prompt:'בספרייה היו 180 ספרים. הגיעו עוד 35 ואז 20 הושאלו. כמה נשארו?',hint:'בנה רצף פעולות.',answer:'195',feedback:'180+35=215 ואז 215-20=195.'},
      {prompt:'5 עפרונות עולים 15 ₪. כמה יעלו 8 עפרונות?',hint:'מצא מחיר לעיפרון אחד.',answer:'24',feedback:'15/5=3 ואז 8×3=24.'}
    ]
  },
  'גאומטריה ומדידה': {
    explanation:'הבחנה בין היקף, שטח, נפח, צורות והמרות יחידות.',
    exercises:[
      {prompt:'מהו ההיקף של מלבן שאורכו 7 ס״מ ורוחבו 3 ס״מ?',hint:'היקף הוא סכום כל הצלעות.',answer:'20',feedback:'2×(7+3)=20.'},
      {prompt:'מהו השטח של אותו מלבן?',hint:'שטח = אורך × רוחב.',answer:'21',feedback:'7×3=21.'}
    ]
  },
  'אוריינות מתמטית': {
    explanation:'יישום מתמטיקה במצבי זמן, כסף, נתונים והשוואה במציאות.',
    exercises:[
      {prompt:'אוטובוס יצא ב-13:20 והנסיעה נמשכה שעה ו-35 דקות. מתי הגיע?',hint:'הוסף שעה ואז 35 דקות.',answer:'14:55',feedback:'13:20+1:35 = 14:55.'},
      {prompt:'3 בקבוקי מים עולים 18 ₪. כמה יעלו 5?',hint:'מצא מחיר ליחידה.',answer:'30',feedback:'18/3=6 ואז 6×5=30.'}
    ]
  },
  'חשיבה מתמטית והבנה': {
    explanation:'חיזוק היכולת להסביר, לנמק, לבדוק תשובה ולהצדיק מהלך.',
    exercises:[
      {prompt:'הסבר מדוע 25 × 4 שווה ל-50 × 2.',hint:'בדוק את שתי המכפלות.',answer:'שתיהן שוות ל-100.',feedback:'המטרה היא להסביר לא רק מה התשובה אלא למה.'},
      {prompt:'כתוב שני מספרים שסכומם 100 והסבר את דרך הבדיקה.',hint:'אפשר לבחור כל זוג מתאים.',answer:'למשל 40 ו-60; בדקתי על ידי חיבור.',feedback:'חשוב לצרף גם הסבר בדיקה.'}
    ]
  }
};

function safeParseJSON(text){try{return JSON.parse(text)}catch(e){return null}}
function escapeHtml(str){return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;')}
function preload(){
  const diagnostic = localStorage.getItem('diagnosticStructuredData');
  const studentName = localStorage.getItem('diagnosticStudentName') || '';
  const className = localStorage.getItem('diagnosticClassName') || '';
  const teacherName = localStorage.getItem('diagnosticTeacherName') || '';
  if (diagnostic) document.getElementById('diagnosticInput').value = diagnostic;
  document.getElementById('studentName2').value = studentName;
  document.getElementById('homeClass').value = className;
  document.getElementById('teacherName').value = teacherName;
  const d = new Date();
  document.getElementById('planDate').value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function buildSummary(diagnostic, weak, medium){
  const w = weak.length ? weak.map(x=>`<li><strong>${escapeHtml(x.domain_name)}:</strong> ${escapeHtml(x.difficulty_type)} (${x.percent}%)</li>`).join('') : '<li>לא זוהו תחומים חלשים ברמת חיזוק משמעותי.</li>';
  const m = medium.length ? medium.map(x=>`<li><strong>${escapeHtml(x.domain_name)}:</strong> נדרש ביסוס נוסף (${x.percent}%).</li>`).join('') : '<li>לא זוהו תחומים ברמת ביניים.</li>';
  return `<p><strong>רמת שליטה כללית:</strong> ${escapeHtml(diagnostic.summary?.level || '')}</p>
  <p><strong>משמעות כללית:</strong> ${escapeHtml(diagnostic.summary?.meaning || '')}</p>
  <h4>תחומים המחייבים חיזוק</h4><ul>${w}</ul>
  <h4>תחומים הדורשים ביסוס</h4><ul>${m}</ul>`;
}
function makeItem(domainName, level, timeframe, notes){
  const tpl = TOPIC_TEMPLATES[domainName] || TOPIC_TEMPLATES['מספרים ופעולות'];
  return {
    type: timeframe === 'week' ? 'דף עבודה' : 'חידון ממוקד',
    title: `${timeframe === 'week' ? 'דף עבודה' : 'חידון'} – ${domainName}`,
    target_domain: domainName,
    goal: `שיפור הדרגתי בתחום ${domainName} ברמת ${level}.`,
    explanation: tpl.explanation,
    level,
    exercises: tpl.exercises,
    notes
  };
}
function generateProgram(){
  const teacherName = document.getElementById('teacherName').value.trim();
  const studentName = document.getElementById('studentName2').value.trim();
  const homeClass = document.getElementById('homeClass').value.trim();
  const planDate = document.getElementById('planDate').value;
  const timeframe = document.getElementById('timeframe').value;
  const studentNotes = document.getElementById('studentNotes').value.trim();
  const diagnosticText = document.getElementById('diagnosticInput').value.trim();
  const msg = document.getElementById('detailsMsg');
  if (!studentName) { msg.innerHTML = '<p style="color:#b42318;font-weight:bold">שם התלמיד הוא שדה חובה.</p>'; return; }
  const diagnostic = safeParseJSON(diagnosticText);
  if (!diagnostic) { msg.innerHTML = '<p style="color:#b42318;font-weight:bold">קוד האבחון אינו בפורמט תקין.</p>'; return; }
  msg.innerHTML = '';
  const domains = diagnostic.domains || {};
  const weak = Object.values(domains).filter(v => Number(v.percent) < 60);
  const medium = Object.values(domains).filter(v => Number(v.percent) >= 60 && Number(v.percent) < 85);
  const targets = weak.length ? weak : medium.length ? medium : Object.values(domains).slice(0,2);
  const items = targets.slice(0, timeframe === 'week' ? 5 : 3).map(d => makeItem(d.domain_name, d.mastery_level || d.level || 'חיזוק', timeframe, studentNotes));
  if (timeframe === 'week' && items.length < 5) {
    ['אוריינות מתמטית','חשיבה מתמטית והבנה'].forEach(name => { if (items.length < 5) items.push(makeItem(name,'ביסוס',timeframe,studentNotes)); });
  }
  document.getElementById('summaryBox').innerHTML = buildSummary(diagnostic, weak, medium);
  document.getElementById('resourceIndex').innerHTML = items.map((it,i)=>`<li>${escapeHtml(it.title)} <span class="pill">${escapeHtml(it.type)}</span></li>`).join('');
  document.getElementById('programContent').innerHTML = items.map((it,i)=>`
    <details open>
      <summary>${i+1}. ${escapeHtml(it.title)} <span class="pill">${escapeHtml(it.type)}</span></summary>
      <p><strong>מטרה:</strong> ${escapeHtml(it.goal)}</p>
      <p><strong>הסבר:</strong> ${escapeHtml(it.explanation)}</p>
      ${it.notes ? `<p><strong>התאמה נוספת:</strong> ${escapeHtml(it.notes)}</p>` : ''}
      ${(it.exercises||[]).map((ex,idx)=>`
        <div class="exercise">
          <strong>תרגיל ${idx+1}:</strong> ${escapeHtml(ex.prompt)}
          <div class="btn-row">
            <button type="button" class="secondary" onclick="toggleBlock('hint_${i}_${idx}')">הצג רמז</button>
            <button type="button" onclick="toggleBlock('ans_${i}_${idx}')">הצג תשובה ופידבק</button>
          </div>
          <div id="hint_${i}_${idx}" class="feedback hidden"><strong>רמז:</strong> ${escapeHtml(ex.hint)}</div>
          <div id="ans_${i}_${idx}" class="feedback hidden"><strong>תשובה:</strong> ${escapeHtml(ex.answer)}<br><strong>פידבק:</strong> ${escapeHtml(ex.feedback)}</div>
        </div>
      `).join('')}
    </details>
  `).join('');
  const output = {
    teacher_name: teacherName,
    student_name: studentName,
    home_class: homeClass,
    created_at: planDate,
    timeframe,
    notes: studentNotes,
    diagnostic_summary: diagnostic,
    generated_items: items.map(it => ({type:it.type,title:it.title,target_domain:it.target_domain,goal:it.goal,level:it.level}))
  };
  document.getElementById('programJson').value = JSON.stringify(output, null, 2);
  document.getElementById('programArea').classList.remove('hidden');
  window.scrollTo({top:document.getElementById('programArea').offsetTop-20, behavior:'smooth'});
}
function toggleBlock(id){ const el = document.getElementById(id); if(el) el.classList.toggle('hidden'); }
document.addEventListener('DOMContentLoaded', preload);
</script>
</body>
</html>
