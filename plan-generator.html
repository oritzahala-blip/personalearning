<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מחולל תכנית לימודים מותאמת – גרסה 2</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--line:#d8e0eb;--text:#1f2937;--muted:#667085;--primary:#155eef;--secondary:#667085;--success:#067647;--soft:#f8fbff;--warm:#fff8ef}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .container{max-width:1120px;margin:24px auto;padding:28px;background:var(--card);border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    h1,h2,h3,h4{margin-top:0;line-height:1.35} p,li{line-height:1.7}.lead,.note{color:var(--muted)}
    .card,.soft,.warm{border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:18px;background:#fff}.soft{background:var(--soft)}.warm{background:var(--warm)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:860px){.grid{grid-template-columns:1fr}.btn-row{flex-direction:column}button{width:100%}}
    label{display:block;font-weight:bold;margin:8px 0 6px} input[type=text],input[type=date],textarea,select{width:100%;padding:11px 12px;border:1px solid #cbd5e1;border-radius:10px;font-size:16px}
    textarea{min-height:120px;resize:vertical}.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px} button{border:none;border-radius:10px;padding:12px 18px;font-size:16px;cursor:pointer;background:var(--primary);color:#fff} button.secondary{background:var(--secondary)}
    details{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px 14px;margin-bottom:14px} summary{cursor:pointer;font-weight:bold}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:13px;background:#eef4ff;color:#194185;margin-inline-start:6px}
    .exercise{background:#fafbfd;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-top:10px}.feedback{margin-top:8px;padding:10px 12px;border-radius:10px;background:#f8fbff;border:1px solid #dbeafe}.hidden{display:none}
    .json{width:100%;min-height:240px;font-family:monospace;direction:ltr;text-align:left;white-space:pre}
  </style>
</head>
<body>
  <div class="container">
    <h1>מחולל תכנית לימודים מותאמת – גרסה 2</h1>
    <p class="lead">המחולל מותאם לשכבות ג׳–ו׳, קורא את נתוני האבחון מהמבדק או מהדבקה ידנית, ובונה תכנית מדורגת לפי שכבה, סוג מבחן, קושי, תחומים חלשים ומשך התכנית.</p>

    <div class="grid">
      <div class="card">
        <label for="teacherName">שם המורה</label>
        <input type="text" id="teacherName" placeholder="שם המורה" />
        <label for="studentName2">שם התלמיד <span style="color:#b42318">*</span></label>
        <input type="text" id="studentName2" placeholder="שם התלמיד" />
        <label for="homeClass">כיתה</label>
        <input type="text" id="homeClass" placeholder="לדוגמה: ה׳2" />
        <label for="planDate">תאריך יצירת התכנית</label>
        <input type="date" id="planDate" />
      </div>
      <div class="card">
        <label for="timeframe">משך התכנית</label>
        <select id="timeframe">
          <option value="short">תכנית קצרה: יום עד שלושה ימים</option>
          <option value="week">תכנית רחבה: עד שבוע</option>
        </select>
        <label for="studentNotes">מידע נוסף (אופציונלי)</label>
        <textarea id="studentNotes" placeholder="למשל: קושי בריכוז, קצב איטי, צורך בתיווך שפתי, העדפה לתרגול חזותי."></textarea>
      </div>
    </div>

    <div class="card">
      <label for="diagnosticInput">קוד אבחון / נתוני אבחון</label>
      <textarea id="diagnosticInput" class="json" placeholder='הדבק כאן JSON של האבחון או הגע ישירות מהמבדק'></textarea>
      <div class="btn-row">
        <button type="button" onclick="generateProgram()">צור תכנית מותאמת</button>
      </div>
      <div id="detailsMsg"></div>
    </div>

    <div id="programArea" class="hidden">
      <div class="warm"><h3>תמצית מצב לימודי</h3><div id="summaryBox"></div></div>
      <div class="soft"><h3>אינדקס תכנית</h3><ol id="resourceIndex"></ol></div>
      <div id="programContent"></div>
      <div class="soft">
        <h3>בלוק נתונים של התכנית</h3>
        <textarea id="programJson" class="json" readonly></textarea>
      </div>
    </div>
  </div>

      {prompt:"אוטובוס יצא ב-13:20 והנסיעה נמשכה שעה ו-35 דקות. מתי הגיע?",hint:"הוסף שעה ואז 35 דקות.",answer:"14:55",feedback:"13:20+1:35 = 14:55."},
      {prompt:"3 בקבוקי מים עולים 18 ₪. כמה יעלו 5?",hint:"מצא מחיר ליחידה.",answer:"30",feedback:"18/3=6 ואז 6×5=30."},
      {prompt:"מחברת עולה 8 ₪. כמה יעלו 4 מחברות?",hint:"זהו מצב של כפל.",answer:"32",feedback:"4×8=32."}
    ]
  },
  "חשיבה מתמטית": {
    explanation:"חיזוק היכולת להסביר, לנמק, לבדוק תשובה ולזהות קשרים מתמטיים.",
    exercises:[
      {prompt:"איזו תשובה מתאימה יותר לשאלה: מה גדול יותר, 3/4 או 5/8? א. 5/8 כי 8 גדול מ-4. ב. 3/4 כי 3/4 = 6/8. ג. שניהם שווים. ד. אי אפשר לדעת.",hint:"חפש תשובה שמסבירה את ההשוואה עצמה.",answer:"ב",feedback:"חשיבה מתמטית טובה כוללת גם נימוק נכון."},
      {prompt:"איזו תשובה מסבירה נכון מדוע 25×4 שווה 50×2? א. כי 25 גדול יותר. ב. כי שתי המכפלות שוות ל-100. ג. כי 4 קטן מ-2. ד. כי זה רק במקרה.",hint:"בדוק את תוצאת שתי המכפלות.",answer:"ב",feedback:"הקשר הנכון הוא שהתוצאה הסופית זהה."},

function safeParseJSON(text){try{return JSON.parse(text)}catch(e){return null}}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function preload(){
  const diagnostic=localStorage.getItem("diagnosticStructuredData");
  const studentName=localStorage.getItem("diagnosticStudentName")||"";
  const className=localStorage.getItem("diagnosticClassName")||"";
  const teacherName=localStorage.getItem("diagnosticTeacherName")||"";
  if(diagnostic)document.getElementById("diagnosticInput").value=diagnostic;
  document.getElementById("studentName2").value=studentName;
  document.getElementById("homeClass").value=className;
  document.getElementById("teacherName").value=teacherName;
  const d=new Date();
  document.getElementById("planDate").value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function normalizeTopicName(name){
  const map={
    "גאומטריה ומדידה":["גאומטריה","מדידה"],
    "חשיבה מתמטית והבנה":["חשיבה מתמטית"]
  };
  return map[name]||[name];
}

function getGradeWeightMap(grade){return KNOWLEDGE_WEIGHTS[grade]||{}}

function adjustPercentByDifficulty(percent,difficulty){
  const profile=DIFFICULTY_PROFILE[difficulty]||DIFFICULTY_PROFILE.regular;
  if(percent<=profile.threshold)return Math.round(percent);
  const adjusted=profile.threshold+(percent-profile.threshold)*profile.factorAboveThreshold;
  return Math.max(0,Math.min(100,Math.round(adjusted)));
}

function collectWeakSubskills(domain){
  const items=domain.items||[];
  const buckets={};
  items.forEach(item=>{
    const key=item.subskill||"מיומנות כללית";
    if(!buckets[key])buckets[key]={earned:0,max:0};
    buckets[key].earned+=Number(item.earned||0);
    buckets[key].max+=Number(item.max||1);
  });
  return Object.entries(buckets).map(([subskill,stats])=>{
    const percent=stats.max?Math.round((stats.earned/stats.max)*100):0;
    return{subskill,percent};
  }).sort((a,b)=>a.percent-b.percent);
}

function buildDomainAnalysis(diagnostic){
  const domains=diagnostic.domains||{};
  const difficulty=diagnostic.exam_config?.difficulty||"regular";
  const grade=diagnostic.student?.grade||"";
  const weightMap=getGradeWeightMap(grade);
  const flat=[];
  Object.values(domains).forEach(domain=>{
    const names=normalizeTopicName(domain.domain_name);
    names.forEach(name=>{
      const adjustedPercent=adjustPercentByDifficulty(domain.percent,difficulty);
      const baseWeight=weightMap[name]??0.08;
      const weight=names.length>1?baseWeight/names.length:baseWeight;
      const gap=100-adjustedPercent;
      const weightedGap=+(gap*weight).toFixed(2);
      flat.push({
        domain_name:name,
        raw_domain_name:domain.domain_name,
        percent:domain.percent,
        adjusted_percent:adjustedPercent,
        weight,
        weighted_gap:weightedGap,
        mastery_level:domain.mastery_level,
        difficulty_type:domain.difficulty_type,
        teacher_meaning:domain.teacher_meaning,
        weak_subskills:collectWeakSubskills(domain)
      });
    });
  });
  return flat.sort((a,b)=>b.weighted_gap-a.weighted_gap);
}

function getLevelBand(adjustedPercent){
  if(adjustedPercent<40)return"חיזוק יסודי";
  if(adjustedPercent<60)return"חיזוק משמעותי";
  if(adjustedPercent<85)return"ביסוס";
  return"העמקה";
}

function getExerciseCountByPriority(rank,timeframe){
  if(timeframe==="week"){
    if(rank===0)return 5;
    if(rank===1)return 4;
    if(rank===2)return 4;
    return 3;
  }
  if(rank===0)return 4;
  if(rank===1)return 3;
  return 2;
}

function buildSubskillNote(weakSubskills){
  if(!weakSubskills||!weakSubskills.length)return"";
  const weakest=weakSubskills.filter(x=>x.percent<70).slice(0,2);
  if(!weakest.length)return"";
  return`דגש מיוחד: ${weakest.map(x=>`${x.subskill} (${x.percent}%)`).join(", ")}.`;
}

function makeItem(domainAnalysis,timeframe,rank,studentNotes){
  const template=TOPIC_TEMPLATES[domainAnalysis.domain_name]||TOPIC_TEMPLATES["מספרים ופעולות"];
  const count=getExerciseCountByPriority(rank,timeframe);
  const level=getLevelBand(domainAnalysis.adjusted_percent);
  const subskillNote=buildSubskillNote(domainAnalysis.weak_subskills);
  const notes=[studentNotes,subskillNote].filter(Boolean).join(" ");
  return{
    type:timeframe==="week"?"דף עבודה":"חידון ממוקד",
    title:`${timeframe==="week"?"דף עבודה":"חידון"} – ${domainAnalysis.domain_name}`,
    target_domain:domainAnalysis.domain_name,
    goal:`שיפור בתחום ${domainAnalysis.domain_name} ברמת ${level}, על בסיס ציון מותאם ${domainAnalysis.adjusted_percent}%.`,
    explanation:template.explanation,
    level,
    weighted_gap:domainAnalysis.weighted_gap,
    weight:domainAnalysis.weight,
    adjusted_percent:domainAnalysis.adjusted_percent,
    raw_percent:domainAnalysis.percent,
    weak_subskills:domainAnalysis.weak_subskills,
    notes,
    exercises:template.exercises.slice(0,count)
  };
}

function buildSummary(diagnostic,domainAnalysis){
  const topWeak=domainAnalysis.filter(d=>d.adjusted_percent<85).slice(0,5);
  const weakHtml=topWeak.length?topWeak.map(d=>`
    <li>
      <strong>${escapeHtml(d.domain_name)}:</strong>
      ציון גולמי ${d.percent}%,
      ציון מותאם ${d.adjusted_percent}%,
      משקל ${(d.weight*100).toFixed(0)}%,
      פער משוקלל ${d.weighted_gap}.
    </li>
  `).join(""):`<li>לא זוהו תחומים בולטים המחייבים טיפול.</li>`;
  return`
    <p><strong>רמת שליטה כללית:</strong> ${escapeHtml(diagnostic.summary?.level||"")}</p>
    <p><strong>משמעות כללית:</strong> ${escapeHtml(diagnostic.summary?.meaning||"")}</p>
    <p><strong>רמת קושי של האבחון:</strong> ${escapeHtml(diagnostic.exam_config?.difficulty||"")}</p>
    <h4>תחומים בעדיפות טיפול</h4>
    <ul>${weakHtml}</ul>
  `;
}

function generateProgram(){
  const teacherName=document.getElementById("teacherName").value.trim();
  const studentName=document.getElementById("studentName2").value.trim();
  const homeClass=document.getElementById("homeClass").value.trim();
  const planDate=document.getElementById("planDate").value;
  const timeframe=document.getElementById("timeframe").value;
  const studentNotes=document.getElementById("studentNotes").value.trim();
  const diagnosticText=document.getElementById("diagnosticInput").value.trim();
  const msg=document.getElementById("detailsMsg");

  if(!studentName){
    msg.innerHTML='<p style="color:#b42318;font-weight:bold">שם התלמיד הוא שדה חובה.</p>';
    return;
  }

  const diagnostic=safeParseJSON(diagnosticText);
  if(!diagnostic){
    msg.innerHTML='<p style="color:#b42318;font-weight:bold">קוד האבחון אינו בפורמט תקין.</p>';
    return;
  }

  msg.innerHTML="";
  const domainAnalysis=buildDomainAnalysis(diagnostic);
  const targetDomains=domainAnalysis.filter(d=>d.adjusted_percent<85);
  const fallbackDomains=domainAnalysis.slice(0,2);
  const chosenDomains=(targetDomains.length?targetDomains:fallbackDomains).slice(0,timeframe==="week"?5:3);
  const items=chosenDomains.map((domain,index)=>makeItem(domain,timeframe,index,studentNotes));

  document.getElementById("summaryBox").innerHTML=buildSummary(diagnostic,domainAnalysis);

  document.getElementById("resourceIndex").innerHTML=items.map(it=>`
    <li>
      ${escapeHtml(it.title)}
      <span class="pill">${escapeHtml(it.type)}</span>
      <span class="pill">משקל ${(it.weight*100).toFixed(0)}%</span>
      <span class="pill">ציון מותאם ${it.adjusted_percent}%</span>
    </li>
  `).join("");

  document.getElementById("programContent").innerHTML=items.map((it,i)=>`
    <details open>
      <summary>${i+1}. ${escapeHtml(it.title)} <span class="pill">${escapeHtml(it.type)}</span></summary>
      <p><strong>מטרה:</strong> ${escapeHtml(it.goal)}</p>
      <p><strong>הסבר:</strong> ${escapeHtml(it.explanation)}</p>
      <p><strong>ציון גולמי:</strong> ${it.raw_percent}%</p>
      <p><strong>ציון מותאם:</strong> ${it.adjusted_percent}%</p>
      <p><strong>משקל תחום:</strong> ${(it.weight*100).toFixed(0)}%</p>
      <p><strong>פער משוקלל:</strong> ${it.weighted_gap}</p>
      ${it.notes?`<p><strong>התאמה נוספת:</strong> ${escapeHtml(it.notes)}</p>`:""}
      ${it.weak_subskills?.length?`<p><strong>תתי-מיומנויות:</strong> ${escapeHtml(it.weak_subskills.slice(0,3).map(x=>`${x.subskill} (${x.percent}%)`).join(", "))}</p>`:""}
      ${(it.exercises||[]).map((ex,idx)=>`
        <div class="exercise">
          <strong>תרגיל ${idx+1}:</strong> ${escapeHtml(ex.prompt)}
          <div class="btn-row">
            <button type="button" class="secondary" onclick="toggleBlock('hint_${i}_${idx}')">הצג רמז</button>
            <button type="button" onclick="toggleBlock('ans_${i}_${idx}')">הצג תשובה ופידבק</button>
          </div>
          <div id="hint_${i}_${idx}" class="feedback hidden"><strong>רמז:</strong> ${escapeHtml(ex.hint)}</div>
          <div id="ans_${i}_${idx}" class="feedback hidden"><strong>תשובה:</strong> ${escapeHtml(ex.answer)}<br><strong>פידבק:</strong> ${escapeHtml(ex.feedback)}</div>
        </div>
      `).join("")}
    </details>
  `).join("");

  const output={
    teacher_name:teacherName,
    student_name:studentName,
    home_class:homeClass,
    created_at:planDate,
    timeframe,
    notes:studentNotes,
    weighting_model:{
      knowledge_weights:KNOWLEDGE_WEIGHTS[diagnostic.student?.grade||""]||{},
      difficulty_profile:DIFFICULTY_PROFILE[diagnostic.exam_config?.difficulty||"regular"]||DIFFICULTY_PROFILE.regular
    },
    diagnostic_summary:diagnostic,
    domain_analysis:domainAnalysis,
    generated_items:items.map(it=>({
      type:it.type,
      title:it.title,
      target_domain:it.target_domain,
      goal:it.goal,
      level:it.level,
      weight:it.weight,
      weighted_gap:it.weighted_gap,
      adjusted_percent:it.adjusted_percent,
      weak_subskills:it.weak_subskills
    }))
  };

  document.getElementById("programJson").value=JSON.stringify(output,null,2);
  document.getElementById("programArea").classList.remove("hidden");
  window.scrollTo({top:document.getElementById("programArea").offsetTop-20,behavior:"smooth"});
}

function toggleBlock(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle("hidden");
}

document.addEventListener("DOMContentLoaded",preload);
</script>
</body>
</html>
