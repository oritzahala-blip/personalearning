<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מבדק דיאגנוסטי רב-שכבתי במתמטיקה</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#dbe3ef;
      --text:#1f2937;
      --muted:#667085;
      --primary:#155eef;
      --secondary:#667085;
      --success:#067647;
      --warning:#b54708;
      --danger:#b42318;
      --soft:#f8fbff;
      --soft2:#fffbea;
    }

    *{box-sizing:border-box}

    html, body{
      margin:0;
      padding:0;
      overflow-x:hidden;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body{direction:rtl}

    .container{
      width:100%;
      max-width:980px;
      margin:0 auto;
      padding:16px;
    }

    h1,h2,h3{margin-top:0; line-height:1.35}
    p, li{line-height:1.7}

    .lead{
      color:var(--muted);
      margin-bottom:22px;
    }

    .card,
    .question,
    .result-box,
    .teacher-box{
      width:100%;
      margin-bottom:18px;
      padding:16px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      overflow:hidden;
    }

    .result-box{
      margin-top:24px;
      background:var(--soft);
      border-color:#dbeafe;
    }

    .teacher-box{
      margin-top:24px;
      background:#fffaf0;
      border-color:#f4d38b;
    }

    .meta-grid,
    .topics-grid,
    .subgrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    @media (max-width:760px){
      .meta-grid,
      .topics-grid,
      .subgrid{
        grid-template-columns:1fr;
      }

      .btn-row{
        flex-direction:column;
      }

      button{
        width:100%;
      }
    }

    label{
      display:block;
      font-weight:bold;
      margin-top:8px;
      margin-bottom:6px;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select{
      width:100%;
      margin-top:8px;
      padding:11px 12px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      background:#fff;
      color:#111827;
      font-size:16px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:24px;
    }

    button{
      border:none;
      border-radius:10px;
      padding:12px 18px;
      cursor:pointer;
      font-size:16px;
      background:var(--primary);
      color:#fff;
    }

    button.secondary{background:var(--secondary)}
    button.ghost{background:#12b76a}
    button.copybtn{background:#194185}

    .hidden{display:none}

    .progress{
      font-size:14px;
      color:var(--muted);
      margin-bottom:12px;
    }

    .example{
      margin-top:10px;
      padding:10px 12px;
      border:1px solid #f0df9b;
      background:var(--soft2);
      border-radius:10px;
      color:#5b4a00;
      font-size:14px;
    }

    .note{
      margin-top:10px;
      font-size:14px;
      color:var(--muted);
    }

    .status-ok{color:var(--success);font-weight:bold}
    .status-bad{color:var(--danger);font-weight:bold}
    .status-warn{color:var(--warning);font-weight:bold}

    .score-big{
      font-size:56px;
      font-weight:700;
      line-height:1;
      margin:0 0 8px 0;
    }

    .score-sub{
      font-size:18px;
      color:var(--muted);
      margin:0;
    }

    .domain-card{
      margin-bottom:16px;
      padding:14px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
    }

    .pill{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      font-size:13px;
      margin-inline-start:8px;
      background:#eef4ff;
      color:#194185;
    }

    .json-area{
      width:100%;
      min-height:260px;
      font-family:monospace;
      direction:ltr;
      text-align:left;
      white-space:pre;
    }

    .math{
      direction:ltr;
      unicode-bidi:bidi-override;
      display:inline-block;
      font-weight:bold;
    }

    .topic-chip{
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      font-weight:normal;
    }

    .inline-help{
      font-size:13px;
      color:var(--muted);
      margin-top:6px;
    }

    .question p{margin:0 0 8px 0}
  </style>
</head>
<body>
  <div class="container">
    <h1>מבדק דיאגנוסטי רב-שכבתי במתמטיקה</h1>
    <p class="lead">המערכת מאפשרת לבנות מבדק מותאם לפי שכבה, סוג מבחן, רמת קושי ונושאים. אם לא נבחרו נושאים, המערכת תטען את נושאי ברירת המחדל המתאימים.</p>

    <div id="setupCard" class="card">
      <h2>הגדרת המבדק</h2>

      <div class="meta-grid">
        <div>
          <label for="studentName">שם התלמיד</label>
          <input type="text" id="studentName" placeholder="הזן שם תלמיד" />
        </div>

        <div>
          <label for="studentClass">כיתה</label>
          <input type="text" id="studentClass" placeholder="לדוגמה: ד׳2" />
        </div>

        <div>
          <label for="teacherName">שם המורה</label>
          <input type="text" id="teacherName" placeholder="הזן שם מורה" />
        </div>

        <div>
          <label for="gradeSelect">שכבת גיל</label>
          <select id="gradeSelect">
            <option value="ג">ג׳</option>
            <option value="ד">ד׳</option>
            <option value="ה">ה׳</option>
            <option value="ו">ו׳</option>
          </select>
        </div>

        <div>
          <label for="examType">סוג מבחן</label>
          <select id="examType">
            <option value="opening">פתיחת שנה</option>
            <option value="midyear">אמצע שנה</option>
            <option value="endyear">סוף שנה</option>
            <option value="focused">מבדק ממוקד</option>
          </select>
        </div>

        <div>
          <label for="difficultyLevel">רמת קושי</label>
          <select id="difficultyLevel">
            <option value="basic">בסיסי</option>
            <option value="regular" selected>רגיל</option>
            <option value="advanced">מתקדם</option>
          </select>
        </div>
      </div>

      <div style="margin-top:18px;">
        <label>נושאים לבחירה</label>
        <div id="topicsContainer" class="topics-grid"></div>
        <div class="inline-help">אם לא תבחר נושאים, המערכת תטען אוטומטית את נושאי ברירת המחדל של השכבה וסוג המבחן.</div>
      </div>

      <div class="btn-row">
        <button type="button" onclick="loadDefaultTopics()">בחר נושאי ברירת מחדל</button>
        <button type="button" class="secondary" onclick="clearTopicSelection()">נקה בחירה</button>
        <button type="button" class="ghost" onclick="buildExam()">בנה מבדק והתחל</button>
      </div>

      <div id="setupMessage"></div>
    </div>

    <form id="quizForm" class="hidden">
      <div class="btn-row">
        <button type="button" class="secondary" onclick="backToSetup()">חזרה להגדרות</button>
      </div>

      <div id="quizMeta" class="card"></div>
      <div id="quizQuestions"></div>

      <div class="btn-row">
        <button type="button" class="ghost" onclick="calculateResults()">סיום וקבלת ציון</button>
      </div>
    </form>

    <div id="studentResult" class="result-box hidden"></div>

    <div id="teacherAccess" class="teacher-box hidden">
      <h3>אבחון מלא</h3>
      <div id="teacherAnalysis" class="hidden"></div>
    </div>
  </div>

  <script>
    const DEFAULT_TOPICS = {
      "ג": {
        opening: ["מספרים ופעולות","בעיות מילוליות","מדידה","גאומטריה בסיסית"],
        midyear: ["מספרים ופעולות","בעיות מילוליות","מדידה","גאומטריה בסיסית"],
        endyear: ["מספרים ופעולות","בעיות מילוליות","מדידה","גאומטריה בסיסית","אוריינות מתמטית"],
        focused: []
      },
      "ד": {
        opening: ["מספרים ופעולות","בעיות מילוליות","גאומטריה","מדידה"],
        midyear: ["מספרים ופעולות","בעיות מילוליות","שברים","גאומטריה","מדידה","אוריינות מתמטית"],
        endyear: ["מספרים ופעולות","בעיות מילוליות","שברים","גאומטריה","מדידה","אוריינות מתמטית","חשיבה מתמטית"],
        focused: []
      },
      "ה": {
        opening: ["מספרים ופעולות","שברים","בעיות מילוליות","גאומטריה","מדידה"],
        midyear: ["מספרים ופעולות","שברים","בעיות מילוליות","גאומטריה","מדידה","אוריינות מתמטית"],
        endyear: ["מספרים ופעולות","שברים","בעיות מילוליות","גאומטריה","מדידה","אוריינות מתמטית","חשיבה מתמטית"],
        focused: []
      },
      "ו": {
        opening: ["מספרים ופעולות","שברים","בעיות מילוליות","גאומטריה","מדידה"],
        midyear: ["מספרים ופעולות","שברים","אחוזים","בעיות מילוליות","גאומטריה","מדידה","חשיבה מתמטית"],
        endyear: ["מספרים ופעולות","שברים","אחוזים","בעיות מילוליות","גאומטריה","מדידה","אוריינות מתמטית","חשיבה מתמטית"],
        focused: []
      }
    };

    const ALL_TOPICS_BY_GRADE = {
      "ג": [
        "מספרים ופעולות",
        "בעיות מילוליות",
        "מדידה",
        "גאומטריה בסיסית",
        "אוריינות מתמטית"
      ],
      "ד": [
        "מספרים ופעולות",
        "בעיות מילוליות",
        "שברים",
        "גאומטריה",
        "מדידה",
        "אוריינות מתמטית",
        "חשיבה מתמטית"
      ],
      "ה": [
        "מספרים ופעולות",
        "שברים",
        "בעיות מילוליות",
        "גאומטריה",
        "מדידה",
        "אוריינות מתמטית",
        "חשיבה מתמטית"
      ],
      "ו": [
        "מספרים ופעולות",
        "שברים",
        "אחוזים",
        "בעיות מילוליות",
        "גאומטריה",
        "מדידה",
        "אוריינות מתמטית",
        "חשיבה מתמטית"
      ]
    };

    const QUESTIONS_PER_TOPIC = 8;

    let activeQuestions = [];
    let currentExamConfig = null;
    let fullAnalysisData = null;

    const gradeSelect = document.getElementById('gradeSelect');
    const examTypeSelect = document.getElementById('examType');

    gradeSelect.addEventListener('change', renderTopics);
    examTypeSelect.addEventListener('change', renderTopics);

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function choice(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr) {
      const clone = [...arr];
      for (let i = clone.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [clone[i], clone[j]] = [clone[j], clone[i]];
      }
      return clone;
    }

    function uniqOptions(correct, distractors) {
      const set = new Set([String(correct), ...distractors.map(x => String(x))]);
      return shuffle([...set]).slice(0, 4);
    }

    function examTypesForAll() {
      return ["opening","midyear","endyear","focused"];
    }

    function makeMultiple({ id, grade, topic, difficulty, subskill, text, correct, options, explanation, examTypes, customRender }) {
      return {
        id,
        grade,
        examTypes: examTypes || examTypesForAll(),
        difficulty,
        topic,
        subskill,
        type: "multiple",
        text,
        options: options.map(String),
        correct: String(correct),
        explanation,
        customRender: customRender || ""
      };
    }

    function numberRangeByGrade(grade, difficulty) {
      const map = {
        "ג": {
          basic: [20, 300],
          regular: [100, 700],
          advanced: [300, 1200]
        },
        "ד": {
          basic: [100, 999],
          regular: [300, 2500],
          advanced: [1000, 5000]
        },
        "ה": {
          basic: [200, 3000],
          regular: [1000, 9000],
          advanced: [5000, 25000]
        },
        "ו": {
          basic: [300, 5000],
          regular: [2000, 15000],
          advanced: [5000, 50000]
        }
      };
      return map[grade][difficulty];
    }

    function arithmeticGenerators(grade, difficulty, countPerType = 12) {
      const out = [];
      const [minN, maxN] = numberRangeByGrade(grade, difficulty);

      for (let i = 0; i < countPerType; i++) {
        let a = rand(minN, maxN);
        let b = rand(minN, maxN);

        out.push(makeMultiple({
          id: `${grade}_num_add_${difficulty}_${i}`,
          grade,
          topic: "מספרים ופעולות",
          difficulty,
          subskill: "חיבור",
          text: `חשב: <span class="math">${a.toLocaleString('en-US')} + ${b.toLocaleString('en-US')}</span>`,
          correct: a + b,
          options: uniqOptions(a + b, [a + b + rand(10, 100), a + b - rand(10, 100), a + b + rand(101, 300)]),
          explanation: "חישוב חיבור"
        }));

        if (a < b) [a, b] = [b, a];
        out.push(makeMultiple({
          id: `${grade}_num_sub_${difficulty}_${i}`,
          grade,
          topic: "מספרים ופעולות",
          difficulty,
          subskill: "חיסור",
          text: `חשב: <span class="math">${a.toLocaleString('en-US')} - ${b.toLocaleString('en-US')}</span>`,
          correct: a - b,
          options: uniqOptions(a - b, [a - b + rand(10, 100), Math.max(0, a - b - rand(10, 100)), a - b + rand(101, 250)]),
          explanation: "חישוב חיסור"
        }));
      }

      const mulMaxA = grade === "ג" ? 10 : grade === "ד" ? 20 : grade === "ה" ? 40 : 60;
      const mulMaxB = grade === "ג" ? 10 : grade === "ד" ? 12 : grade === "ה" ? 20 : 25;

      for (let i = 0; i < countPerType; i++) {
        const a = rand(2, mulMaxA);
        const b = rand(2, mulMaxB);
        const c = a * b;

        out.push(makeMultiple({
          id: `${grade}_num_mul_${difficulty}_${i}`,
          grade,
          topic: "מספרים ופעולות",
          difficulty,
          subskill: "כפל",
          text: `חשב: <span class="math">${a} × ${b}</span>`,
          correct: c,
          options: uniqOptions(c, [c + rand(1, 12), Math.max(1, c - rand(1, 12)), c + rand(13, 30)]),
          explanation: "חישוב כפל"
        }));

        const divisor = rand(2, Math.min(12, mulMaxB));
        const quotient = rand(2, mulMaxA);
        const dividend = divisor * quotient;

        out.push(makeMultiple({
          id: `${grade}_num_div_${difficulty}_${i}`,
          grade,
          topic: "מספרים ופעולות",
          difficulty,
          subskill: "חילוק",
          text: `חשב: <span class="math">${dividend} ÷ ${divisor}</span>`,
          correct: quotient,
          options: uniqOptions(quotient, [quotient + 1, Math.max(1, quotient - 1), quotient + 2]),
          explanation: "חישוב חילוק"
        }));
      }

      for (let i = 0; i < 10; i++) {
        const n = rand(100, grade === "ג" ? 999 : grade === "ד" ? 9999 : 99999);
        const digits = String(n).split('');
        const idx = rand(0, digits.length - 1);
        const digit = Number(digits[idx]);
        const place = digits.length - idx - 1;
        const value = digit * Math.pow(10, place);

        out.push(makeMultiple({
          id: `${grade}_num_place_${difficulty}_${i}`,
          grade,
          topic: "מספרים ופעולות",
          difficulty,
          subskill: "ערך ספרה",
          text: `מה הערך של הספרה ${digit} במספר <span class="math">${n.toLocaleString('en-US')}</span>?`,
          correct: value,
          options: uniqOptions(value, [digit, digit * 10, digit * 1000]),
          explanation: "ערך ספרה"
        }));
      }

      return out;
    }

    function wordProblemGenerators(grade, difficulty, count = 16) {
      const out = [];
      const nouns = ["מחברות", "עפרונות", "ספרים", "מדבקות", "כיסאות", "כדורים"];

      for (let i = 0; i < count; i++) {
        const item = choice(nouns);
        const per = rand(3, grade === "ג" ? 9 : 15);
        const groups = rand(3, grade === "ג" ? 8 : 12);
        const total = per * groups;

        out.push(makeMultiple({
          id: `${grade}_word_mul_${difficulty}_${i}`,
          grade,
          topic: "בעיות מילוליות",
          difficulty,
          subskill: "כפל בבעיה מילולית",
          text: `בכל קופסה יש ${per} ${item}. כמה ${item} יש ב-${groups} קופסאות?`,
          correct: total,
          options: uniqOptions(total, [total + per, total - per, total + groups]),
          explanation: "תרגום בעיה מילולית לכפל"
        }));

        const start = rand(80, 500);
        const add = rand(15, 90);
        const remove = rand(10, 60);
        const result = start + add - remove;

        out.push(makeMultiple({
          id: `${grade}_word_steps_${difficulty}_${i}`,
          grade,
          topic: "בעיות מילוליות",
          difficulty,
          subskill: "בעיה דו-שלבית",
          text: `בספרייה היו ${start} ספרים. נוספו עוד ${add} ספרים ולאחר מכן נגרעו ${remove} ספרים. כמה ספרים יש עכשיו?`,
          correct: result,
          options: uniqOptions(result, [result + add, result - add, result + remove]),
          explanation: "בעיה רב-שלבית"
        }));
      }

      return out;
    }

    function measurementGenerators(grade, difficulty, count = 12) {
      const out = [];

      for (let i = 0; i < count; i++) {
        const meters = rand(1, 9);
        out.push(makeMultiple({
          id: `${grade}_measure_cm_${difficulty}_${i}`,
          grade,
          topic: "מדידה",
          difficulty,
          subskill: "המרת יחידות",
          text: `כמה ס״מ יש ב-${meters} מטרים?`,
          correct: meters * 100,
          options: uniqOptions(meters * 100, [meters * 10, meters * 1000, meters * 50]),
          explanation: "המרת מטרים לסנטימטרים"
        }));

        const hours = rand(1, 5);
        const minutes = choice([10, 15, 20, 25, 30, 40, 45, 50]);
        const totalMinutes = hours * 60 + minutes;

        out.push(makeMultiple({
          id: `${grade}_measure_time_${difficulty}_${i}`,
          grade,
          topic: "מדידה",
          difficulty,
          subskill: "יחידות זמן",
          text: `כמה דקות יש ב-${hours} שעות ו-${minutes} דקות?`,
          correct: totalMinutes,
          options: uniqOptions(totalMinutes, [hours * 60, totalMinutes + 10, totalMinutes - 10]),
          explanation: "המרת שעות ודקות לדקות"
        }));
      }

      return out;
    }

    function geometryGenerators(grade, difficulty, count = 14) {
      const out = [];
      const topic = grade === "ג" ? "גאומטריה בסיסית" : "גאומטריה";

      for (let i = 0; i < count; i++) {
        const length = rand(3, 15);
        const width = rand(2, 10);
        const perimeter = 2 * (length + width);
        const area = length * width;

        if (grade !== "ג") {
          out.push(makeMultiple({
            id: `${grade}_geo_per_${difficulty}_${i}`,
            grade,
            topic,
            difficulty,
            subskill: "היקף",
            text: `מהו ההיקף של מלבן שאורכו ${length} ס״מ ורוחבו ${width} ס״מ?`,
            correct: perimeter,
            options: uniqOptions(perimeter, [length + width, area, perimeter + 4]),
            explanation: "חישוב היקף מלבן"
          }));

          out.push(makeMultiple({
            id: `${grade}_geo_area_${difficulty}_${i}`,
            grade,
            topic,
            difficulty,
            subskill: "שטח",
            text: `מהו השטח של מלבן שאורכו ${length} ס״מ ורוחבו ${width} ס״מ?`,
            correct: area,
            options: uniqOptions(area, [perimeter, area + length, area + width]),
            explanation: "חישוב שטח מלבן"
          }));
        } else {
          const shape = choice([
            { name: "משולש", sides: 3 },
            { name: "מלבן", sides: 4 },
            { name: "ריבוע", sides: 4 },
            { name: "מחומש", sides: 5 }
          ]);

          out.push(makeMultiple({
            id: `${grade}_geo_shape_${difficulty}_${i}`,
            grade,
            topic,
            difficulty,
            subskill: "זיהוי צורות",
            text: `ל${shape.name} יש כמה צלעות?`,
            correct: shape.sides,
            options: uniqOptions(shape.sides, [2, 4, 6]),
            explanation: "היכרות עם צורות"
          }));
        }
      }

      return out;
    }

    function fractionGenerators(grade, difficulty, count = 18) {
      const out = [];
      const denominators = grade === "ד" ? [2,4,8,10] : [2,3,4,5,6,8,10,12];

      for (let i = 0; i < count; i++) {
        const d1 = choice(denominators);
        const n1 = rand(1, d1 - 1);

        out.push(makeMultiple({
          id: `${grade}_frac_ident_${difficulty}_${i}`,
          grade,
          topic: "שברים",
          difficulty,
          subskill: "זיהוי שבר",
          text: `איזה שבר מייצג ${n1} חלקים מתוך ${d1} חלקים שווים?`,
          correct: `${n1}/${d1}`,
          options: shuffle([`${n1}/${d1}`, `${d1}/${n1}`, `1/${d1}`, `${Math.max(1,n1-1)}/${d1}`]),
          explanation: "זיהוי שבר"
        }));

        const d2 = choice(denominators);
        const n2 = rand(1, d2 - 1);
        const v1 = n1 / d1;
        const v2 = n2 / d2;
        const bigger = v1 === v2 ? "equal" : (v1 > v2 ? `${n1}/${d1}` : `${n2}/${d2}`);

        out.push(makeMultiple({
          id: `${grade}_frac_cmp_${difficulty}_${i}`,
          grade,
          topic: "שברים",
          difficulty,
          subskill: "השוואת שברים",
          text: `מה גדול יותר?`,
          customRender: `<div class="math">${n1}/${d1} לעומת ${n2}/${d2}</div>`,
          correct: bigger,
          options: shuffle([`${n1}/${d1}`, `${n2}/${d2}`, "equal", "unknown"]),
          explanation: "השוואת שברים"
        }));
      }

      return out;
    }

    function literacyGenerators(grade, difficulty, count = 16) {
      const out = [];

      for (let i = 0; i < count; i++) {
        const price = rand(3, 12);
        const qty = rand(2, 8);
        const total = price * qty;

        out.push(makeMultiple({
          id: `${grade}_lit_money_${difficulty}_${i}`,
          grade,
          topic: "אוריינות מתמטית",
          difficulty,
          subskill: "כסף",
          text: `מחיר מחברת הוא ${price} ₪. כמה יעלו ${qty} מחברות?`,
          correct: total,
          options: uniqOptions(total, [total + price, total - price, total + qty]),
          explanation: "יישום מתמטי בסיטואציה יומיומית"
        }));

        const startHour = rand(8, 18);
        const startMinute = choice([0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50]);
        const durMin = choice([20, 30, 35, 40, 45, 50, 60, 75, 90, 110, 135]);
        const totalStart = startHour * 60 + startMinute;
        const totalEnd = totalStart + durMin;
        const endH = Math.floor(totalEnd / 60);
        const endM = totalEnd % 60;
        const correctTime = `${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}`;

        const wrong1 = `${String(endH).padStart(2,'0')}:${String((endM + 10) % 60).padStart(2,'0')}`;
        const wrong2 = `${String(Math.max(0, endH - 1)).padStart(2,'0')}:${String(endM).padStart(2,'0')}`;
        const wrong3 = `${String(endH).padStart(2,'0')}:${String((endM + 20) % 60).padStart(2,'0')}`;

        out.push(makeMultiple({
          id: `${grade}_lit_time_${difficulty}_${i}`,
          grade,
          topic: "אוריינות מתמטית",
          difficulty,
          subskill: "זמן",
          text: `אירוע התחיל בשעה ${String(startHour).padStart(2,'0')}:${String(startMinute).padStart(2,'0')} ונמשך ${durMin} דקות. מתי הוא הסתיים?`,
          correct: correctTime,
          options: shuffle([correctTime, wrong1, wrong2, wrong3]),
          explanation: "חישוב זמן"
        }));
      }

      return out;
    }

    function percentGenerators(grade, difficulty, count = 16) {
      const out = [];
      if (grade !== "ו") return out;

      for (let i = 0; i < count; i++) {
        const base = choice([100, 120, 150, 200, 240, 300, 400, 500]);
        const pct = choice([10, 20, 25, 50]);
        const val = base * pct / 100;

        out.push(makeMultiple({
          id: `${grade}_pct_part_${difficulty}_${i}`,
          grade,
          topic: "אחוזים",
          difficulty,
          subskill: "אחוז מתוך כמות",
          text: `מה הם ${pct}% מתוך ${base}?`,
          correct: val,
          options: uniqOptions(val, [val + 10, Math.max(1, val - 10), val + 25]),
          explanation: "חישוב אחוז מתוך כמות"
        }));

        const discountPrice = base - val;
        out.push(makeMultiple({
          id: `${grade}_pct_disc_${difficulty}_${i}`,
          grade,
          topic: "אחוזים",
          difficulty,
          subskill: "הנחה",
          text: `מחיר מוצר הוא ${base} ₪. יש הנחה של ${pct}%. מה המחיר לאחר ההנחה?`,
          correct: discountPrice,
          options: uniqOptions(discountPrice, [base + val, val, discountPrice + 20]),
          explanation: "חישוב מחיר לאחר הנחה"
        }));
      }

      return out;
    }

    function thinkingGenerators(grade, difficulty, count = 12) {
      const out = [];

      for (let i = 0; i < count; i++) {
        if (grade === "ד") {
          const a = rand(10, 60);
          const b = 100 - a;
          const wrong1 = `${a} ו-${100 - a + rand(1,5)}`;
          const wrong2 = `${a + rand(1,5)} ו-${b + rand(1,5)}`;
          const wrong3 = `${a - rand(1,5)} ו-${b}`;

          out.push(makeMultiple({
            id: `${grade}_think_sum_${difficulty}_${i}`,
            grade,
            topic: "חשיבה מתמטית",
            difficulty,
            subskill: "הסבר",
            text: `איזו תשובה מתאימה לדרישה: "כתוב שני מספרים שסכומם 100"?`,
            correct: `${a} ו-${b}`,
            options: shuffle([`${a} ו-${b}`, wrong1, wrong2, wrong3]),
            explanation: "בודק הבנת משמעות הדרישה"
          }));
        }

        if (grade === "ה") {
          const x = choice([25, 15, 12]);
          const y = choice([4, 6, 8]);
          const product = x * y;

          out.push(makeMultiple({
            id: `${grade}_think_eq_${difficulty}_${i}`,
            grade,
            topic: "חשיבה מתמטית",
            difficulty,
            subskill: "הנמקה",
            text: `איזו תשובה מסבירה נכון מדוע <span class="math">${x} × ${y}</span> שווה ל-${product}?`,
            correct: `מפני שכפל נותן מכפלה, ו-${x} פעמים ${y} שווה ${product}.`,
            options: shuffle([
              `מפני שכפל נותן מכפלה, ו-${x} פעמים ${y} שווה ${product}.`,
              `מפני שבכפל תמיד מחברים את שני המספרים.`,
              `מפני שהתוצאה תמיד גדולה ב-1 מהמספר הגדול.`,
              `מפני שכל תרגיל כפל שווה לתוצאה אקראית.`
            ]),
            explanation: "בודק הבנת הסבר מתמטי"
          }));
        }

        if (grade === "ו") {
          const divider = choice([10, 100, 1000]);

          out.push(makeMultiple({
            id: `${grade}_think_div_${difficulty}_${i}`,
            grade,
            topic: "חשיבה מתמטית",
            difficulty,
            subskill: "הסבר",
            text: `מה קורה לערך של מספר כאשר מחלקים אותו ב-${divider}?`,
            correct: `המספר קטן פי ${divider}.`,
            options: shuffle([
              `המספר קטן פי ${divider}.`,
              `המספר גדל פי ${divider}.`,
              `המספר נשאר תמיד אותו דבר.`,
              `אי אפשר לדעת בלי לחשב כל מספר בנפרד.`
            ]),
            explanation: "בודק הבנת משמעות חילוק"
          }));
        }
      }

      return out;
    }

    function buildQuestionBank() {
      let bank = [];

      ["basic","regular","advanced"].forEach(difficulty => {
        bank.push(...arithmeticGenerators("ג", difficulty, 10));
        bank.push(...wordProblemGenerators("ג", difficulty, 8));
        bank.push(...measurementGenerators("ג", difficulty, 8));
        bank.push(...geometryGenerators("ג", difficulty, 8));
        bank.push(...literacyGenerators("ג", difficulty, 8));

        bank.push(...arithmeticGenerators("ד", difficulty, 10));
        bank.push(...wordProblemGenerators("ד", difficulty, 8));
        bank.push(...fractionGenerators("ד", difficulty, 10));
        bank.push(...geometryGenerators("ד", difficulty, 10));
        bank.push(...measurementGenerators("ד", difficulty, 8));
        bank.push(...literacyGenerators("ד", difficulty, 8));
        bank.push(...thinkingGenerators("ד", difficulty, 6));

        bank.push(...arithmeticGenerators("ה", difficulty, 10));
        bank.push(...wordProblemGenerators("ה", difficulty, 8));
        bank.push(...fractionGenerators("ה", difficulty, 10));
        bank.push(...geometryGenerators("ה", difficulty, 10));
        bank.push(...measurementGenerators("ה", difficulty, 8));
        bank.push(...literacyGenerators("ה", difficulty, 8));
        bank.push(...thinkingGenerators("ה", difficulty, 6));

        bank.push(...arithmeticGenerators("ו", difficulty, 10));
        bank.push(...wordProblemGenerators("ו", difficulty, 8));
        bank.push(...fractionGenerators("ו", difficulty, 10));
        bank.push(...percentGenerators("ו", difficulty, 10));
        bank.push(...geometryGenerators("ו", difficulty, 10));
        bank.push(...measurementGenerators("ו", difficulty, 8));
        bank.push(...literacyGenerators("ו", difficulty, 8));
        bank.push(...thinkingGenerators("ו", difficulty, 6));
      });

      return bank;
    }

    const QUESTION_BANK = buildQuestionBank();

    function renderTopics() {
      const grade = gradeSelect.value;
      const allTopics = ALL_TOPICS_BY_GRADE[grade] || [];
      const container = document.getElementById('topicsContainer');

      container.innerHTML = '';

      allTopics.forEach(topic => {
        const label = document.createElement('label');
        label.className = 'topic-chip';
        label.innerHTML = `
          <input type="checkbox" class="topic-checkbox" value="${escapeHtml(topic)}" />
          ${escapeHtml(topic)}
        `;
        container.appendChild(label);
      });
    }

    function getSelectedTopics() {
      return Array.from(document.querySelectorAll('.topic-checkbox:checked')).map(cb => cb.value);
    }

    function clearTopicSelection() {
      document.querySelectorAll('.topic-checkbox').forEach(cb => cb.checked = false);
    }

    function loadDefaultTopics() {
      clearTopicSelection();
      const grade = gradeSelect.value;
      const examType = examTypeSelect.value;
      const defaults = DEFAULT_TOPICS[grade]?.[examType] || [];

      document.querySelectorAll('.topic-checkbox').forEach(cb => {
        if (defaults.includes(cb.value)) cb.checked = true;
      });
    }

    function buildExam() {
      const grade = gradeSelect.value;
      const examType = examTypeSelect.value;
      const difficulty = document.getElementById('difficultyLevel').value;
      let selectedTopics = getSelectedTopics();

      if (!selectedTopics.length) {
        selectedTopics = DEFAULT_TOPICS[grade]?.[examType] || [];
      }

      const setupMessage = document.getElementById('setupMessage');
      if (!selectedTopics.length) {
        setupMessage.innerHTML = '<p class="status-bad">לא נמצאו נושאים מתאימים לבחירה. בחר נושאים או שנה סוג מבחן.</p>';
        return;
      }

      const matched = QUESTION_BANK.filter(q =>
        q.grade === grade &&
        q.examTypes.includes(examType) &&
        q.difficulty === difficulty &&
        selectedTopics.includes(q.topic)
      );

      let questionPool = matched;
      if (questionPool.length < selectedTopics.length * QUESTIONS_PER_TOPIC) {
        questionPool = QUESTION_BANK.filter(q =>
          q.grade === grade &&
          selectedTopics.includes(q.topic)
        );
      }

      const selectedQuestions = [];
      selectedTopics.forEach(topic => {
        const pool = shuffle(questionPool.filter(q => q.topic === topic));
        selectedQuestions.push(...pool.slice(0, QUESTIONS_PER_TOPIC));
      });

      activeQuestions = shuffle(
        selectedQuestions.filter((q, index, self) => self.findIndex(x => x.id === q.id) === index)
      );

      if (activeQuestions.length < 4) {
        setupMessage.innerHTML = '<p class="status-bad">בנק השאלות עבור הבחירה הזו עדיין קטן מדי. נסה לבחור רמת קושי אחרת או עוד נושאים.</p>';
        return;
      }

      currentExamConfig = {
        studentName: document.getElementById('studentName').value.trim(),
        studentClass: document.getElementById('studentClass').value.trim(),
        teacherName: document.getElementById('teacherName').value.trim(),
        grade,
        examType,
        difficulty,
        topics: selectedTopics
      };

      setupMessage.innerHTML = '';
      renderExam();
      document.getElementById('setupCard').classList.add('hidden');
      document.getElementById('quizForm').classList.remove('hidden');
      document.getElementById('studentResult').classList.add('hidden');
      document.getElementById('teacherAccess').classList.add('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderExam() {
      const quizMeta = document.getElementById('quizMeta');
      const quizQuestions = document.getElementById('quizQuestions');

      quizMeta.innerHTML = `
        <h2>פרטי המבדק</h2>
        <p><strong>שם התלמיד:</strong> ${escapeHtml(currentExamConfig.studentName || 'לא הוזן')}</p>
        <p><strong>כיתה:</strong> ${escapeHtml(currentExamConfig.studentClass || 'לא הוזנה')}</p>
        <p><strong>שם המורה:</strong> ${escapeHtml(currentExamConfig.teacherName || 'לא הוזן')}</p>
        <p><strong>שכבה:</strong> ${escapeHtml(currentExamConfig.grade)}</p>
        <p><strong>סוג מבחן:</strong> ${escapeHtml(examTypeLabel(currentExamConfig.examType))}</p>
        <p><strong>רמת קושי:</strong> ${escapeHtml(difficultyLabel(currentExamConfig.difficulty))}</p>
        <p><strong>נושאים:</strong> ${escapeHtml(currentExamConfig.topics.join(', '))}</p>
        <p><strong>מספר שאלות:</strong> ${activeQuestions.length}</p>
      `;

      quizQuestions.innerHTML = activeQuestions.map((q, index) => {
        const questionNumber = index + 1;

        if (q.type === 'multiple') {
          return `
            <div class="question">
              <div class="progress">שאלה ${questionNumber} מתוך ${activeQuestions.length} • ${escapeHtml(q.topic)}</div>
              <p><strong>${questionNumber}.</strong> ${q.text}</p>
              ${q.customRender ? `<div class="example">${q.customRender}</div>` : ''}
              <select id="q_${q.id}">
                <option value="">בחר תשובה</option>
                ${q.options.map(opt => `<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`).join('')}
              </select>
            </div>
          `;
        }

        return '';
      }).join('');
    }

    function backToSetup() {
      document.getElementById('quizForm').classList.add('hidden');
      document.getElementById('setupCard').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function examTypeLabel(val) {
      return {
        opening: 'פתיחת שנה',
        midyear: 'אמצע שנה',
        endyear: 'סוף שנה',
        focused: 'מבדק ממוקד'
      }[val] || val;
    }

    function difficultyLabel(val) {
      return {
        basic: 'בסיסי',
        regular: 'רגיל',
        advanced: 'מתקדם'
      }[val] || val;
    }

    function getQuestionTopicScoreMap() {
      const map = {};
      activeQuestions.forEach(q => {
        if (!map[q.topic]) {
          map[q.topic] = { score: 0, max: 0, items: [] };
        }
        map[q.topic].max += 1;
      });
      return map;
    }

    function getPerformanceLabel(percent) {
      if (percent >= 85) return 'שליטה מלאה';
      if (percent >= 60) return 'שליטה חלקית';
      return 'נדרש חיזוק משמעותי';
    }

    function getPerformanceMeaning(domainName, percent) {
      if (percent >= 85) return 'התלמיד מפגין שליטה טובה מאוד בתחום ' + domainName + ', מבצע את המשימות בדיוק גבוה ומראה בסיס יציב להמשך למידה.';
      if (percent >= 60) return 'התלמיד מפגין שליטה חלקית בתחום ' + domainName + '. קיימת הבנה בסיסית, אך נדרשים עוד תרגול, ביסוס והעמקה.';
      return 'התלמיד מתקשה בתחום ' + domainName + '. מומלץ תהליך ממוקד של הוראה מותאמת, תרגול מדורג וביסוס מושגים.';
    }

    function getFinalMeaning(percent) {
      if (percent >= 85) return 'התמונה הכוללת מצביעה על שליטה גבוהה מאוד ברוב התחומים שנבדקו.';
      if (percent >= 70) return 'התמונה הכוללת חיובית. יש בסיס טוב, אך נדרשת העמקה במספר תחומים.';
      if (percent >= 50) return 'התמונה הכוללת מצביעה על שליטה חלקית. קיימים פערים משמעותיים המחייבים התערבות ממוקדת.';
      return 'התמונה הכוללת מצביעה על צורך בחיזוק יסודי ובהתאמה אישית של תהליך הלמידה.';
    }

    function inferErrorTypeFromTopic(topic, percent) {
      if (percent >= 85) return 'אין אינדיקציה לפער מהותי בתחום זה.';
      if (topic.includes('מספרים')) return 'קושי חישובי או שליטה חלקית בפעולות.';
      if (topic.includes('שברים')) return 'קושי מושגי בהבנת שברים ובהשוואה או חיבור.';
      if (topic.includes('בעיות')) return 'קושי בתרגום שאלה מילולית לפעולה חשבונית.';
      if (topic.includes('גאומטריה')) return 'קושי בגאומטריה, היקף, שטח או הבנת מבנים.';
      if (topic.includes('מדידה')) return 'קושי בהמרת יחידות, זמן או מדידה כמותית.';
      if (topic.includes('אוריינות')) return 'קושי ביישום מתמטיקה במצבים יומיומיים.';
      if (topic.includes('חשיבה')) return 'קושי בהבנת משמעות מתמטית ובבחירת נימוק נכון.';
      if (topic.includes('אחוזים')) return 'קושי בחישובי אחוזים ובהבנת אחוז מתוך כמות או הנחה.';
      return 'קושי כללי בתחום זה.';
    }

    function buildRecommendation(data) {
      const weak = data.needsSupport || [];
      if (!weak.length) return 'מומלץ להעשיר ולהעמיק: משימות אתגר, שאלות הסבר, חקר דפוסים ופתרון בעיות מרובות שלבים.';
      if (weak.some(x => x.includes('חשיבה'))) return 'מומלץ לשלב תרגול של קריאת תשובות, הבנת נימוק נכון והשוואה בין הסברים מתמטיים.';
      if (weak.some(x => x.includes('בעיות')) || weak.some(x => x.includes('אוריינות'))) return 'מומלץ לתרגל המרה של טקסט לפעולה: סימון נתונים, בחירת פעולה, בדיקת סבירות התוצאה.';
      if (weak.some(x => x.includes('שברים'))) return 'מומלץ לחזק הבנה מושגית של שברים באמצעות ייצוגים חזותיים, השוואות וחיבור שברים פשוטים.';
      if (weak.some(x => x.includes('מספרים'))) return 'מומלץ לבסס שוב ערך ספרה, עובדות כפל, חילוק ותהליכי חישוב מדורגים.';
      if (weak.some(x => x.includes('גאומטריה'))) return 'מומלץ לחזק הבחנה בין היקף לשטח, תרגול צורות ותכונותיהן ופתרון משימות גאומטריות מדורגות.';
      if (weak.some(x => x.includes('מדידה'))) return 'מומלץ לחזק המרות יחידות, זמן ומדידה באמצעות תרגול קצר ועקבי.';
      if (weak.some(x => x.includes('אחוזים'))) return 'מומלץ לתרגל אחוז מתוך כמות, הנחות וקישור בין אחוז לשבר ולעשרוני.';
      return 'מומלץ לבנות תכנית תרגול קצרה, עקבית ומדורגת, המתמקדת תחילה בתחומים החלשים ורק אחר כך בהעשרה.';
    }

    function buildResultsPayload() {
      const topicScores = getQuestionTopicScoreMap();
      const answers = {};

      let totalRaw = 0;
      let totalMax = 0;

      activeQuestions.forEach(q => {
        const answer = document.getElementById(`q_${q.id}`)?.value || '';
        answers[q.id] = answer;

        const earned = q.type === 'multiple' && answer === q.correct ? 1 : 0;

        topicScores[q.topic].score += earned;
        topicScores[q.topic].items.push({
          id: q.id,
          subskill: q.subskill,
          earned,
          max: 1,
          explanation: q.explanation
        });

        totalRaw += earned;
        totalMax += 1;
      });

      const topicSummary = {};
      let strengths = [];
      let needsSupport = [];

      Object.keys(topicScores).forEach(topic => {
        const raw = topicScores[topic].score;
        const max = topicScores[topic].max;
        const percent = Math.round((raw / max) * 100);

        topicSummary[topic] = {
          domain_name: topic,
          raw_score: raw,
          max_score: max,
          percent,
          mastery_level: getPerformanceLabel(percent),
          difficulty_type: inferErrorTypeFromTopic(topic, percent),
          teacher_meaning: getPerformanceMeaning(topic, percent),
          items: topicScores[topic].items
        };

        if (percent >= 85) strengths.push(topic);
        if (percent < 60) needsSupport.push(topic);
      });

      const totalPercent = Math.round((totalRaw / totalMax) * 100);

      const structured = {
        student: {
          name: currentExamConfig.studentName,
          className: currentExamConfig.studentClass,
          grade: currentExamConfig.grade
        },
        exam_config: {
          exam_type: currentExamConfig.examType,
          difficulty: currentExamConfig.difficulty,
          topics: currentExamConfig.topics
        },
        score: totalPercent,
        summary: {
          level: getPerformanceLabel(totalPercent),
          meaning: getFinalMeaning(totalPercent)
        },
        domains: topicSummary,
        strengths,
        needs_support: needsSupport,
        next_step_recommendation: buildRecommendation({ needsSupport })
      };

      return {
        student: {
          name: currentExamConfig.studentName,
          className: currentExamConfig.studentClass,
          teacherName: currentExamConfig.teacherName,
          grade: currentExamConfig.grade
        },
        examConfig: currentExamConfig,
        answers,
        topicSummary,
        strengths,
        needsSupport,
        total: {
          raw: totalRaw,
          max: totalMax,
          percent: totalPercent,
          level: getPerformanceLabel(totalPercent),
          meaning: getFinalMeaning(totalPercent)
        },
        structured
      };
    }

    function continueToPlanGenerator() {
      const data = fullAnalysisData;
      if (!data) return;

      localStorage.setItem('diagnosticStructuredData', JSON.stringify(data.structured));
      localStorage.setItem('diagnosticStudentName', data.student?.name || '');
      localStorage.setItem('diagnosticClassName', data.student?.className || '');
      localStorage.setItem('diagnosticTeacherName', data.student?.teacherName || '');

      window.location.href = 'plan-generator.html';
    }

    function openMicrosoftForm() {
      const data = fullAnalysisData;
      if (!data) return;

      const studentName = data.student?.name || '';
      const className = data.student?.className || '';
      const ageLayer = data.student?.grade || className || '';

      const strengths = (data.strengths || []).join(', ') || 'לא זוהו';
      const weaknesses = (data.needsSupport || []).join(', ') || 'לא זוהו';

      const diagnosticSummary =
`שם התלמיד: ${studentName}
כיתה: ${className}
שכבה: ${data.student?.grade || ''}
ציון: ${data.total?.percent || ''}

תחומים לחיזוק:
${weaknesses}

תחומים חזקים:
${strengths}

סיכום:
${data.total?.meaning || ''}`;

      const baseUrl = 'https://forms.office.com/Pages/ResponsePage.aspx?id=DQSIkWdsW0yxEjajBLZtrQAAAAAAAAAAAAN__rwMqcdUNkdaWjNOQzZKV0QzNVNJSTI5MUhOV1BQTC4u';

      const url =
        baseUrl +
        '&r1c74ac76d3d9420b85a753d3933c5f01=' + encodeURIComponent(studentName) +
        '&rb5b4c33c14ff484aaff23ae1e3aaf9f7=' + encodeURIComponent(ageLayer) +
        '&r28495b0ab2ca4f3991bd35e45014d8de=' + encodeURIComponent(diagnosticSummary);

      window.open(url, '_blank');
    }

    function calculateResults() {
      const data = buildResultsPayload();
      fullAnalysisData = data;

      localStorage.setItem('diagnosticStructuredData', JSON.stringify(data.structured));
      localStorage.setItem('diagnosticStudentName', data.student?.name || '');
      localStorage.setItem('diagnosticClassName', data.student?.className || '');
      localStorage.setItem('diagnosticTeacherName', data.student?.teacherName || '');

      const quizForm = document.getElementById('quizForm');
      const studentResult = document.getElementById('studentResult');
      const teacherAccess = document.getElementById('teacherAccess');

      if (quizForm) {
        quizForm.classList.add('hidden');
      }

      if (teacherAccess) {
        teacherAccess.classList.add('hidden');
      }

      if (studentResult) {
        studentResult.innerHTML = `
          <div class="score-big">${data.total.percent}</div>
          <p class="score-sub">הציון הסופי</p>

          <div class="result-box" style="margin-top:16px;background:#fff;">
            <p><strong>שם התלמיד:</strong> ${escapeHtml(data.student?.name || 'לא הוזן')}</p>
            <p><strong>כיתה:</strong> ${escapeHtml(data.student?.className || 'לא הוזנה')}</p>
            <p><strong>שכבה:</strong> ${escapeHtml(data.student?.grade || '')}</p>
            <p><strong>משמעות כללית:</strong> ${escapeHtml(data.total?.meaning || '')}</p>
          </div>

          <div class="btn-row">
            <button type="button" class="secondary" onclick="showOpenAnalysis()">הצג אבחון מלא</button>
            <button type="button" class="ghost" onclick="continueToPlanGenerator()">פתח תכנית למידה מותאמת</button>
            <button type="button" class="ghost" onclick="openMicrosoftForm()">שלח תקציר אבחון לטופס Microsoft Forms</button>
          </div>

          <p class="note">הציון מוצג כאן תחילה. לאחר מכן ניתן לפתוח אבחון מלא או לעבור למחולל.</p>
        `;
        studentResult.classList.remove('hidden');
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function copyStructuredData() {
      const area = document.getElementById('structuredDataArea');
      if (!area) return;

      area.select();
      area.setSelectionRange(0, 999999);

      navigator.clipboard.writeText(area.value).then(() => {
        const msg = document.getElementById('copyMsg');
        if (msg) msg.innerHTML = '<p class="status-ok">נתוני האבחון הועתקו.</p>';
      }).catch(() => {
        const msg = document.getElementById('copyMsg');
        if (msg) msg.innerHTML = '<p class="status-warn">לא ניתן היה להעתיק אוטומטית. אפשר להעתיק ידנית מתוך החלון.</p>';
      });
    }

    function showOpenAnalysis() {
      const teacherAnalysis = document.getElementById('teacherAnalysis');
      const teacherAccess = document.getElementById('teacherAccess');
      const data = fullAnalysisData;

      if (!data) return;

      teacherAccess.classList.remove('hidden');

      teacherAnalysis.innerHTML = `
        <div class="result-box" style="background:#fff;">
          <h3>אבחון מלא</h3>
          <p><strong>שם התלמיד:</strong> ${escapeHtml(data.student.name || 'לא הוזן')}</p>
          <p><strong>כיתה:</strong> ${escapeHtml(data.student.className || 'לא הוזנה')}</p>
          <p><strong>שם המורה:</strong> ${escapeHtml(data.student.teacherName || 'לא הוזן')}</p>
          <p><strong>שכבה:</strong> ${escapeHtml(data.student.grade || '')}</p>
          <p><strong>ציון סופי:</strong> ${data.total.percent} <span class="pill">${escapeHtml(data.total.level)}</span></p>
          <p><strong>משמעות כללית:</strong> ${escapeHtml(data.total.meaning)}</p>

          <h3>חוזקות בולטות</h3>
          <p>${data.strengths.length ? escapeHtml(data.strengths.join(', ')) : 'לא זוהו תחומי חוזקה בולטים.'}</p>

          <h3>תחומים המחייבים חיזוק</h3>
          <p>${data.needsSupport.length ? escapeHtml(data.needsSupport.join(', ')) : 'לא זוהו תחומים המחייבים חיזוק משמעותי.'}</p>

          <h3>פירוט לפי תחומים</h3>
          ${Object.entries(data.topicSummary).map(([topic, d]) => `
            <div class="domain-card">
              <strong>${escapeHtml(topic)}</strong><br>
              <strong>ציון תחומי:</strong> ${d.percent}%<br>
              <strong>רמת שליטה:</strong> ${escapeHtml(d.mastery_level)}<br>
              <strong>אופי הקושי/הביצוע:</strong> ${escapeHtml(d.difficulty_type)}<br>
              <strong>פירוש:</strong> ${escapeHtml(d.teacher_meaning)}
            </div>
          `).join('')}

          <h3>המלצה להמשך</h3>
          <p>${escapeHtml(buildRecommendation(data))}</p>

          <h3>קוד אבחון מלא</h3>
          <textarea id="structuredDataArea" class="json-area" readonly>${JSON.stringify(data.structured, null, 2)}</textarea>

          <div class="btn-row">
            <button type="button" class="copybtn" onclick="copyStructuredData()">העתק קוד אבחון</button>
            <button type="button" class="ghost" onclick="continueToPlanGenerator()">פתח תכנית למידה מותאמת</button>
          </div>
          <div id="copyMsg"></div>
        </div>
      `;

      teacherAnalysis.classList.remove('hidden');
      teacherAccess.scrollIntoView({ behavior: 'smooth' });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    renderTopics();
    loadDefaultTopics();
  </script>
</body>
</html>
